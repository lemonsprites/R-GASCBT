<!DOCTYPE html>
<html lang="id">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBT MTsN 1 CIAMIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    /* (style sama seperti kode Anda) */
    :root {
      --primary-color: #0d47a1;
      --accent-color: #ffca28;
    }

    body {
      background-color: #f8f9fa;
      font-family: "Noto Sans", sans-serif;
    }

    .navbar-cbt {
      background: var(--primary-color);
      border-bottom: 5px solid var(--accent-color);
      color: white;
    }

    .login-container {
      max-width: 450px;
      margin-top: 80px;
    }

    .card-login {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .q-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      background: white;
    }

    .btn-nomor {
      width: 45px;
      height: 45px;
      margin: 4px;
      font-weight: bold;
      border-radius: 8px;
    }

    .status-yakin {
      background-color: #0d6efd !important;
      color: white;
      border: none;
    }

    .status-ragu {
      background-color: #ffc107 !important;
      color: black;
      border: none;
    }

    .active-now {
      border: 3px solid #333 !important;
    }

    .opt-box {
      cursor: pointer;
      border: 1px solid #dee2e6;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: 0.3s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .opt-box:hover {
      background-color: #f1f3f5;
    }

    .opt-selected {
      background-color: #e3f2fd;
      border-color: #0d6efd;
      font-weight: 500;
    }

    .gambar-pertanyaan {
      max-width: 100%;
      height: auto;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .gambar-opsi {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #dee2e6;
      flex-shrink: 0;
    }

    .teks-opsi {
      align-items: center;
      flex: 1;
    }

    .opsi-badge {
      display: inline-block;
      font-weight: bold;
      margin-right: 8px;
      color: #0d6efd;
    }

    .d-none {
      display: none !important;
    }

    #timer-display {
      font-weight: bold;
      font-size: 1.2rem;
      color: #d32f2f;
      background: white;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .arabic-line {
      direction: rtl;
      text-align: right;
      font-family: 'Amiri', 'Traditional Arabic', 'Noto Sans Arabic', 'Tahoma', sans-serif;
      font-size: 1.8rem;
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }

    .latin-line {
      direction: ltr;
      text-align: left;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin-bottom: 0.5rem;
    }

    .rtl-opt {
      direction: rtl;
      text-align: right;
    }

    .rtl-opt .opsi-badge {
      float: left;
      margin-left: 8px;
      margin-right: 0;
    }

    .highlight {
      background-color: #ffeb3b;
      color: #000;
      padding: 0 4px;
      border-radius: 4px;
      font-weight: 500;
    }

    .btn-reload {
      background-color: #17a2b8;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 10px;
      width: 100%;
    }

    .btn-reload:hover {
      background-color: #138496;
    }

    .latin-line,
    .arabic-line,
    .teks-opsi {
      white-space: pre-wrap;
    }

    .stimulus-text {
      white-space: pre-wrap;
    }

    /* ===== MOBILE FRIENDLY ===== */
    @media (max-width: 768px) {
      .q-card {
        padding: 1rem !important;
      }

      .btn-nomor {
        width: 40px;
        height: 40px;
        font-size: 0.8rem;
      }

      .opt-box {
        padding: 12px;
        gap: 8px;
      }

      .teks-opsi {
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .gambar-opsi {
        width: 80px;
        height: 80px;
        flex-shrink: 0;
      }

      .arabic-line {
        font-size: 1.3rem;
      }

      .latin-line {
        font-size: 1rem;
      }

      .stimulus-text {
        font-size: 0.9rem;
      }

      #timer-display {
        font-size: 0.9rem;
        padding: 3px 10px;
      }

      .btn-reload {
        font-size: 0.8rem;
      }
    }

    /* Pastikan teks panjang tidak overflow */
    .latin-line,
    .arabic-line,
    .teks-opsi {
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }

    /* Opsi box lebih rapi */
    .opt-box {
      align-items: flex-start;
      width: 100%;
    }

    .opsi-badge {
      flex-shrink: 0;
    }
  </style>
</head>

<body>

        CIAMIS</span>
      <div id="wrapper-timer" class="d-none"><span id="timer-display">00:00:00</span></div>
    </div>
  </nav>

  <div class="container">
    <div id="view-login" class="login-container mx-auto">
      <div class="card card-login p-4">
        <h4 class="text-center fw-bold mb-4 text-primary">LOGIN PESERTA</h4>

        <div class="mb-3"><label class="form-label small fw-bold text-muted">KELAS</label><select id="in-kelas"
            class="form-select form-control-lg fs-6">
            <option value="" disabled selected>-- Pilih Kelas --</option>
            <option value="9A">Kelas 9A</option>
            <option value="9B">Kelas 9B</option>
            <option value="9C">Kelas 9C</option>
            <option value="9D">Kelas 9D</option>
            <option value="9E">Kelas 9E</option>
            <option value="9F">Kelas 9F</option>
          </select></div>
        <div class="mb-4"><label class="form-label small fw-bold text-danger">TOKEN</label><input type="text"
            id="in-token" class="form-control form-control-lg text-center fw-bold" placeholder="MASUKKAN TOKEN">
        </div>
        <button class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="mulaiProses()">MULAI UJIAN</button>
        <div class='w-100 text-center mt-3'><a href="?page=admin">Masuk Admin Panel</a></div>
      </div>
    </div>

    <div id="view-exam" class="row d-none">
      <div class="col-lg-8 mb-4">
        <div class="q-card p-4">
          <div class="d-flex justify-content-between border-bottom pb-3 mb-4">
            <span id="txt-mapel" class="badge bg-secondary p-2">MAPEL</span><span id="txt-no"
              class="fw-bold text-primary">SOAL NOMOR 1</span>
          </div>
          <div id="area-soal" class="mb-5" style="min-height: 250px;"></div>
          <div class="row g-2 text-center border-top pt-4">
            <div class="col-4"><button class="btn btn-outline-dark w-100 py-2" onclick="move(-1)">KEMBALI</button></div>
            <div class="col-4">
              <button id="btn-ragu" class="btn btn-warning w-100 py-2 fw-bold" onclick="setRagu()">RAGU-RAGU</button>
            </div>
            <div class="col-4"><button class="btn btn-primary w-100 py-2 fw-bold" onclick="move(1)">LANJUT</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="q-card p-3">
          <h6 class="fw-bold mb-3"><i class="bi bi-grid-3x3-gap-fill me-2"></i>NOMOR SOAL</h6>
          <div id="area-nav" class="d-flex flex-wrap justify-content-center mb-4"></div>
          <hr>
          <div id="info-lock" class="text-center mb-2 small text-danger fw-bold"></div>
          <button id="btn-selesai" class="btn btn-danger w-100 fw-bold py-2 shadow-sm" disabled
            onclick="konfirmasiSelesai()">SELESAI UJIAN</button>
          <button id="btn-reload" class="btn-reload" onclick="reloadJawabanTersimpan()" style="display:none;"><i
              class="bi bi-arrow-repeat"></i> Muat Ulang Jawaban</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let lastSavedJawabanCount = 0;
    // ==================== KONFIGURASI REDIS ====================
    const REDIS_ENDPOINT = "https://dear-monarch-83839.upstash.io";
    const REDIS_TOKEN = "gQAAAAAAAUd_AAIgcDE2Y2JmMTZhZWU5OGE0MmRkOTI3ZDc5ZTU1ZDYzNDIzZg";

    async function redisCommand(...args) {
      const response = await fetch(REDIS_ENDPOINT, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${REDIS_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(args)
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      return data.result;
    }
    async function hsetBatch(key, fieldValueMap) {
      const args = ['HSET', key];
      for (const [field, value] of Object.entries(fieldValueMap)) args.push(field, value);
      return redisCommand(...args);
    }
    async function hgetall(key) {
      const arr = await redisCommand('HGETALL', key);
      const obj = {};
      for (let i = 0; i < arr.length; i += 2) obj[arr[i]] = arr[i + 1];
      return obj;
    }
    async function exists(key) { return await redisCommand('EXISTS', key) === 1; }
    async function setex(key, seconds, value) { return await redisCommand('SETEX', key, seconds, value); }
    async function del(...keys) { return await redisCommand('DEL', ...keys); }

    // ==================== VARIABEL GLOBAL ====================
    let quest = [], kunci = {}, jawUser = {}, ragu = {}; stimMap = {};
    let idx = 0, sisa = 0, statusUjian = "OFF";
    let pelanggaran = 0;
    let currentToken = '', currentUsername = '', currentNama = '', currentKelas = '', currentMapel = '', currentLoginVia = '';
    let timerInterval = null;
    let isSubmitting = false;
    let currentRedisKey = '';
    let pendingViolationTimer = null;
    let autoSaveInterval = null;
    const TOLERANSI_DETIK = 3;

    // ================== LOCALSTORAGE BACKUP ==================
    /**
     * Melakukan Backup dan Restorasi data karena error dari perangkat, serta handle eksepsi kegagalan aplikasi
     * 
     * 
     * @lemonsprite (https://github.com/lemonsprites/)
     * 
     * Lihat Code History di: https://github.com/lemonsprites/cbt-um
     * */
    function simpanKeLocalStorage() {
      if (!currentToken || !currentUsername) return;
      try { localStorage.setItem(`cbt_local_${currentToken}_${currentUsername}`, JSON.stringify(jawUser)); } catch (e) { console.error(e); }
    }
    function muatDariLocalStorage() {
      const key = `cbt_local_${currentToken}_${currentUsername}`;
      const data = localStorage.getItem(key);
      if (data) { Object.assign(jawUser, JSON.parse(data)); return true; }
      return false;
    }
    function hapusLocalStorage() { localStorage.removeItem(`cbt_local_${currentToken}_${currentUsername}`); }
    function setRedisKey(token, username) { currentRedisKey = `cbt:${token}:${username}`; }

    async function saveAllJawaban() {
      if (!currentRedisKey || Object.keys(jawUser).length === 0) return;
      try { await hsetBatch(currentRedisKey, jawUser); } catch (e) { console.error('Gagal simpan jawaban batch:', e); }
    }
    function startAutoSave() {
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      autoSaveInterval = setInterval(() => { if (statusUjian === "AKTIF") saveAllJawaban(); }, 600000);
    }
    window.addEventListener('beforeunload', () => { if (statusUjian === "AKTIF") saveAllJawaban(); });

    async function muatJawabanDariRedis() {
      const jawaban = await hgetall(currentRedisKey);
      if (Object.keys(jawaban).length > 0) {
        Object.assign(jawUser, jawaban);
        // Konversi data lama dari format kunci_0 ke teks
        for (let id in jawUser) {
          const val = jawUser[id];
          if (typeof val === 'string' && val.includes('_')) {
            const soal = quest.find(q => q.id === id);
            if (soal) {
              const idx = parseInt(val.split('_')[1]);
              if (soal.opsi && soal.opsi[idx]) {
                jawUser[id] = soal.opsi[idx].text;
              }
            }
          }
        }
        lastSavedJawabanCount = Object.keys(jawUser).length;
        hapusLocalStorage();
      } else {
        muatDariLocalStorage();
      }
    }
    async function cekSudahUjianRedis(username, mapel) { return await exists(`done:${mapel}:${username}`); }
    async function tandaiSudahUjianRedis(username, mapel) { await setex(`done:${mapel}:${username}`, 86400, '1'); }

    function hitungSkorLokal(jawabanTeks, kunci) {
      let benar = 0;
      const total = Object.keys(kunci).length;
      for (let id in kunci) {
        const userJawab = jawabanTeks[id] || "";
        const kunciJawab = kunci[id];
        if (Array.isArray(kunciJawab)) {
          const userArr = Array.isArray(userJawab) ? userJawab : [userJawab];
          if (userArr.sort().join() === kunciJawab.sort().join()) benar++;
        } else { if (userJawab === kunciJawab) benar++; }
      }
      return total > 0 ? Math.round((benar / total) * 100) : 0;
    }
    function hitungPersentaseJawaban() { return quest.length ? (Object.keys(jawUser).length / quest.length) * 100 : 0; }

    function catatPelanggaran() {
      if (statusUjian !== "AKTIF") return;
      pelanggaran++;
      const persen = hitungPersentaseJawaban();
      const autoKirim = (persen >= 75 && pelanggaran >= 3);
      if (pelanggaran === 1) Swal.fire('Peringatan 1', 'Jangan pindah tab atau biarkan layar mati terlalu lama!', 'warning');
      else if (pelanggaran === 2) Swal.fire('Peringatan 2', 'Segera kembali ke ujian. Jika sekali lagi, akan dikirim otomatis (jika sudah menjawab ≥75%).', 'error');
      else if (pelanggaran >= 3) {
        if (autoKirim) Swal.fire('Peringatan', `Anda telah meninggalkan ujian terlalu lama (${pelanggaran} kali) dan sudah menjawab ${Math.floor(persen)}% soal. Jawaban akan dikirim otomatis.`, 'error').then(() => kirimJawaban());
        else Swal.fire('Peringatan', `Anda telah meninggalkan ujian (${pelanggaran} kali). Belum bisa dikirim otomatis karena jawaban baru ${Math.floor(persen)}% (<75%). Segera kerjakan!`, 'error');
      }
    }
    document.addEventListener('visibilitychange', () => {
      if (statusUjian !== "AKTIF") return;
      if (document.hidden) {
        if (pendingViolationTimer) clearTimeout(pendingViolationTimer);
        pendingViolationTimer = setTimeout(() => { catatPelanggaran(); pendingViolationTimer = null; }, TOLERANSI_DETIK * 1000);
      } else { if (pendingViolationTimer) { clearTimeout(pendingViolationTimer); pendingViolationTimer = null; } }
    });

    async function reloadJawabanTersimpan() {
      if (!currentToken || !currentUsername) return Swal.fire('Info', 'Data session tidak lengkap', 'info');
      Swal.fire({ title: 'Memuat ulang jawaban...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      await muatJawabanDariRedis();
      showQuest(); showNav();
      Swal.fire('Sukses', `Berhasil memuat ${Object.keys(jawUser).length} jawaban tersimpan`, 'success', 1500);
    }

    // ==================== HANDLE KONEKSI OFFLINE/RETRY ====================
    /**
     * Antisipasi koneksi internet gagal, serta handle eksepsi kegagalan data jawaban aplikasi
     * 
     * 
     * @lemonsprite (https://github.com/lemonsprites/)
     * 
     * Lihat Code History di: https://github.com/lemonsprites/cbt-um
     * */
    let pendingSync = false; // apakah ada data yang belum tersimpan ke Redis

    // Fungsi untuk mengecek koneksi dan memberi notifikasi
    function updateConnectionStatus() {
      const isOnline = navigator.onLine;
      if (isOnline) {
        console.log('✅ Koneksi internet tersedia');
        if (pendingSync && statusUjian === 'AKTIF') {
          console.log('🔄 Mencoba menyimpan ulang jawaban ke Redis...');
          saveAllJawaban().then(() => {
            pendingSync = false;
            console.log('✅ Sinkronisasi ulang berhasil');
            Swal.fire({
              icon: 'success',
              title: 'Tersinkronisasi',
              text: 'Jawaban Anda telah disimpan kembali ke server.',
              toast: true,
              position: 'top-end',
              showConfirmButton: false,
              timer: 3000
            });
          }).catch(e => console.error('Gagal sync ulang:', e));
        }
      } else {
        console.warn('⚠️ Koneksi internet terputus. Jawaban disimpan sementara di perangkat.');
        pendingSync = true;
        // Simpan ke localStorage sebagai cadangan (sebenarnya sudah disimpan setiap pilih)
        simpanKeLocalStorage();
        // Notifikasi ringan
        Swal.fire({
          icon: 'warning',
          title: 'Koneksi Terputus',
          text: 'Jawaban tetap tersimpan di perangkat Anda. Akan disinkronkan otomatis saat koneksi pulih.',
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 4000
        });
      }
    }

    // Override fungsi saveAllJawaban agar menangani offline
    const originalSaveAllJawaban = saveAllJawaban;
    saveAllJawaban = async function () {
      if (!navigator.onLine) {
        console.warn('Offline: jawaban disimpan ke localStorage saja.');
        simpanKeLocalStorage();
        pendingSync = true;
        return; // tidak mencoba fetch ke Redis
      }
      try {
        await originalSaveAllJawaban();
        pendingSync = false;
      } catch (e) {
        console.error('Gagal simpan ke Redis:', e);
        simpanKeLocalStorage();
        pendingSync = true;
      }
    };

    // Pasang event listener untuk online/offline
    window.addEventListener('online', () => {
      updateConnectionStatus();
    });
    window.addEventListener('offline', () => {
      updateConnectionStatus();
    });

    // Panggil sekali saat awal untuk mengecek status
    window.addEventListener('load', () => {
      updateConnectionStatus();
    });

    // ==================== FULLSCREEN ====================
    /**
     * Fullscreen sih, tapi banyak picu pelanggaran jadi fungsi keamanan dilonggarin dengan
     * Interval 3 detik
     * 
     * 
     * @lemonsprite (https://github.com/lemonsprites/)
     * 
     * Lihat Code History di: https://github.com/lemonsprites/cbt-um
     * */
    let fullscreenBypass = false, alreadyWarnedExit = false;
    function enterFullscreen() {
      const docEl = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        try { docEl.requestFullscreen?.() || docEl.webkitRequestFullscreen?.() || docEl.msRequestFullscreen?.(); } catch (err) { console.warn(err); }
      }
    }
    function exitFullscreen() { const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen; if (exit) exit.call(document); }
    function onFullscreenChange() {
      const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (!isFullscreen && !fullscreenBypass && statusUjian === "AKTIF" && !alreadyWarnedExit) {
        alreadyWarnedExit = true;
        Swal.fire({ icon: 'warning', title: 'Mode layar penuh keluar', text: 'Ujian tetap berjalan, namun pengawas akan mencatat.', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
        setTimeout(() => { alreadyWarnedExit = false; }, 60000);
      }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    window.addEventListener('load', () => {
      Swal.fire({ icon: 'info', title: 'Tips Ujian', text: 'Gunakan mode layar penuh untuk kenyamanan. Fullscreen akan aktif saat ujian dimulai.', toast: true, position: 'top-end', showConfirmButton: false, timer: 4000, timerProgressBar: true });
    });
    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
      if (e.ctrlKey && e.code === 'Space') {
        e.preventDefault();
        fullscreenBypass = true;
        exitFullscreen();
        if (statusUjian === "AKTIF") Swal.fire('Admin Bypass', 'Anda keluar dari mode layar penuh. Ujian tetap berjalan.', 'info');
        setTimeout(() => { fullscreenBypass = false; }, 10000);
      }
    });

    // ==================== LOGIN ====================
    /**
     * Login validasi dari data sheet.
     * 
     * Proses:
     * 1. Cek Sheet Siswa
     * 2. Cek Jadwal
     * 3. Parsing Waktu Ujian
     * 3. Caching Soal ke Redis (buat naikin performa appscript) -> cacheSet ambil soal -> parse
     * 4. Proses Mulai Ujian + Notifikasi
     * 
     * 
     * @lemonsprite (https://github.com/lemonsprites/)
     * 
     * Lihat Code History di: https://github.com/lemonsprites/cbt-um
     * */
    async function mulaiProses() {
      const userInput = document.getElementById('in-user').value;
      const k = document.getElementById('in-kelas').value;
      const t = document.getElementById('in-token').value;
      if (!userInput || !k || !t) return Swal.fire('Error', 'Lengkapi semua field!', 'error');
      currentToken = t;
      currentKelas = k;
      setRedisKey(currentToken, '');
      Swal.fire({ title: 'Menyiapkan Soal...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      google.script.run
        .withSuccessHandler(async (res) => {
          if (res.status === "success") {
            currentUsername = res.username;
            currentNama = res.namaSiswa;
            currentLoginVia = res.loginVia;
            currentMapel = res.mapel;
            sisa = res.sisaWaktuServer;
            stimMap = res.stimulus || {};
            quest = res.soal;
            kunci = res.kunci;
            jawUser = {};
            setRedisKey(currentToken, currentUsername);
            const sudah = await cekSudahUjianRedis(currentUsername, currentMapel);
            if (sudah) { Swal.fire('Info', 'Anda sudah mengikuti ujian ini!', 'info').then(() => resetAll()); return; }
            if (sisa <= 0) { Swal.fire('Waktu Habis', 'Sesi ujian telah berakhir.', 'error').then(() => resetAll()); return; }
            await muatJawabanDariRedis();
            lastSavedJawabanCount = Object.keys(jawUser).length;
            Swal.fire({
              title: `Selamat datang, ${res.namaSiswa}!`,
              html: `Anda akan mengerjakan <strong>${res.mapel}</strong>.<br>Waktu tersisa: ${Math.floor(sisa / 60)} menit.<br><span style="color:green">Jawaban dipulihkan: ${Object.keys(jawUser).length} soal</span>`,
              icon: 'success',
              confirmButtonText: `${Object.keys(jawUser).length > 0 ? 'Lanjutkan' : 'Mulai'} Ujian Sekarang`,
              allowOutsideClick: false
            }).then(() => {
              enterFullscreen();
              statusUjian = "AKTIF";
              setex(`active:${currentToken}:${currentUsername}`, sisa + 300, '1');
              document.getElementById('view-login').classList.add('d-none');
              document.getElementById('view-exam').classList.remove('d-none');
              document.getElementById('wrapper-timer').classList.remove('d-none');
              document.getElementById('txt-mapel').innerText = res.mapel;
              document.getElementById('btn-reload').style.display = 'block';
              idx = 0;
              showQuest();
              showNav();
              startTimer();
              startAutoSave();
            });
          } else { Swal.fire('Gagal', res.pesan, 'error'); }
        })
        .withFailureHandler(err => Swal.fire('Error', 'Koneksi bermasalah: ' + err.message, 'error'))
        .cekLogin(t, userInput, k);
    } // <-- TUTUP FUNGSI mulaiProses

    // ==================== FUNGSI GLOBAL UNTUK UJIAN ====================
    /**
     * Sebenernya ini helper buat formatting kayak RTL dan Mardown (.MD) biar sedikit hits
     * plus dengan fungsi navigasi serta bantuan
     * 
     * 
     * @lemonsprite (https://github.com/lemonsprites/)
     * 
     * Lihat Code History di: https://github.com/lemonsprites/cbt-um
     * */
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    function formatMarkdownInline(text) {
      if (!text) return '';
      // Langsung ganti markdown dengan HTML (tanpa escapeHtml terlebih dahulu)
      let html = text
        .replace(/\*\*([\s\S]*?)\*\*/g, '<strong>$1</strong>')
        .replace(/__([\s\S]*?)__/g, '<strong>$1</strong>')
        .replace(/\*([\s\S]*?)\*/g, '<em>$1</em>')
        .replace(/_([\s\S]*?)_/g, '<em>$1</em>')
        .replace(/==([\s\S]*?)==/g, '<mark class="highlight">$1</mark>')
        .replace(/~~([\s\S]*?)~~/g, '<del>$1</del>')
        .replace(/\+\+([\s\S]*?)\+\+/g, '<u>$1</u>')
        .replace(/`([\s\S]*?)`/g, '<code>$1</code>')
        // Tangani baris baru (sudah di-handle oleh CSS white-space, tapi agar rapi)
        .replace(/\n/g, '<br>');
      return html;
    }

    function showQuest() {
      const s = quest[idx]; if (!s) return;
      document.getElementById('txt-no').innerHTML = `SOAL NOMOR ${idx + 1}`;

      let pertanyaanTeks = s.pertanyaan;
      let stimHtml = '';
      const stimMatch = pertanyaanTeks.match(/\[stimulus:([^\]]+)\]/);
      if (stimMatch && stimMap[stimMatch[1]]) {
        stimHtml = `<div class="alert alert-info stimulus-text mb-3" style="white-space: pre-wrap;">${formatMarkdownInline(stimMap[stimMatch[1]])}</div>`;
        pertanyaanTeks = pertanyaanTeks.replace(/\[stimulus:[^\]]+\]/, '').trim();
      }

      const lines = pertanyaanTeks.split(/\r?\n/);
      let pertanyaanHtml = '';
      lines.forEach(line => {
        line = line.trim(); if (line === '') return;
        const hasArabic = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(line);
        const dir = hasArabic ? 'rtl' : 'ltr';
        const className = hasArabic ? 'arabic-line' : 'latin-line';
        pertanyaanHtml += `<div class="${className}" dir="${dir}">${formatMarkdownInline(line)}</div>`;
      });

      let html = `<div class="fs-5 mb-4 fw-medium">${stimHtml}${pertanyaanHtml}</div>`;
      if (s.gambarPertanyaan) {
        html += `<div class="text-center mb-3"><img src="${s.gambarPertanyaan}" class="gambar-pertanyaan" onerror="this.style.display='none'" alt="Gambar soal"></div>`;
      }

      if (s.opsi && s.opsi.length > 0) {
        s.opsi.forEach((opsi, optIndex) => {
          // Bandingkan dengan teks jawaban yang tersimpan
          const isSelected = String(jawUser[s.id]) === opsi.text;
          const optionLetter = String.fromCharCode(65 + optIndex);
          const optKey = `${s.id}_${optIndex}`;
          const hasArabicOpt = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(opsi.text);
          const optDir = hasArabicOpt ? 'rtl' : 'ltr';
          const optClass = hasArabicOpt ? 'rtl-opt' : '';
          html += `<div class="opt-box ${isSelected ? 'opt-selected' : ''} ${optClass}" onclick="pilih('${s.id}', '${optKey}')" dir="${optDir}">
          <div class="opsi-badge">${optionLetter}.</div>`;
          if (opsi.imageUrl) html += `<img src="${opsi.imageUrl}" class="gambar-opsi" onerror="this.style.display='none'" alt="Gambar opsi">`;
          html += `<div class="teks-opsi">${formatMarkdownInline(opsi.text || `Pilihan ${optionLetter}`)}</div>`;
          if (isSelected) html += `<i class="bi bi-check-circle-fill text-primary fs-5"></i>`;
          html += `</div>`;
        });
      } else {
        html += '<p class="text-muted">Tidak ada opsi jawaban</p>';
      }
      document.getElementById('area-soal').innerHTML = html;
    }

    function pilih(soalId, optKey) {
      const soal = quest.find(q => q.id === soalId);
      let selectedText = "";
      if (soal && optKey) {
        const optIndex = parseInt(optKey.split('_')[1]);
        if (soal.opsi && soal.opsi[optIndex]) {
          selectedText = soal.opsi[optIndex].text;
        }
      }
      // Jika jawaban sebelumnya sudah ada dan sama, tidak perlu simpan ulang
      if (jawUser[soalId] === selectedText) return;

      jawUser[soalId] = selectedText;
      delete ragu[soalId];
      showQuest();
      showNav();
      simpanKeLocalStorage();

      // Autosave berdasarkan jumlah soal terjawab (kelipatan 5)
      const currentCount = Object.keys(jawUser).length;
      if (currentCount % 5 === 0 && currentCount !== lastSavedJawabanCount) {
        lastSavedJawabanCount = currentCount;
        saveAllJawaban().catch(e => console.error('Gagal autosave kelipatan:', e));
      }
    }

    function move(n) {
      if (idx + n >= 0 && idx + n < quest.length) {
        idx += n;
        showQuest();
        showNav();
      }
    }

    function setRagu() {
      const s = quest[idx]; if (!s) return;
      if (!jawUser[s.id]) return Swal.fire('Info', 'Pilih jawaban dulu sebelum memberi tanda ragu-ragu', 'info');
      ragu[s.id] = !ragu[s.id]; showNav();
      Swal.fire('Info', `Soal ${idx + 1} ${ragu[s.id] ? 'ditandai ragu-ragu' : 'tidak ragu lagi'}`, 'info', 1000);
    }

    function showNav() {
      let h = '';
      quest.forEach((s, i) => {
        let cls = 'btn-outline-secondary';
        if (ragu[s.id]) cls = 'status-ragu';
        else if (jawUser[s.id]) cls = 'status-yakin';
        let act = i === idx ? 'active-now' : '';
        h += `<button class="btn btn-nomor ${cls} ${act}" onclick="navigasiKe(${i})">${i + 1}</button>`;
      });
      document.getElementById('area-nav').innerHTML = h;
      document.getElementById('info-lock').innerHTML = `<i class="bi bi-check-circle"></i> Terjawab: ${Object.keys(jawUser).length}/${quest.length}`;
    }
    function navigasiKe(tujuan) { idx = tujuan; showQuest(); showNav(); }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (sisa <= 0) { kirimJawaban(); return; }
      const display = document.getElementById('timer-display');
      const infoLock = document.getElementById('info-lock');
      const btnSelesai = document.getElementById('btn-selesai');
      timerInterval = setInterval(() => {
        if (statusUjian !== "AKTIF") { clearInterval(timerInterval); return; }
        if (sisa <= 0) { clearInterval(timerInterval); kirimJawaban(); return; }
        sisa--;
        let h = Math.floor(sisa / 3600), m = Math.floor((sisa % 3600) / 60), s = sisa % 60;
        display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        const isWaktuKritis = sisa <= 600;
        if (isWaktuKritis) {
          btnSelesai.disabled = false;
          infoLock.innerHTML = `<i class="bi bi-unlock-fill"></i> Tombol Selesai Aktif (waktu kritis)`;
          infoLock.classList.remove('text-danger'); infoLock.classList.add('text-success');
        } else {
          btnSelesai.disabled = true;
          let menitTunggu = Math.floor((sisa - 600) / 60);
          let detikTunggu = (sisa - 600) % 60;
          infoLock.innerHTML = `<i class="bi bi-lock-fill"></i> Selesai akan aktif dalam: ${menitTunggu}:${detikTunggu.toString().padStart(2, '0')} menit (waktu kritis ≤ 10 menit)`;
          infoLock.classList.add('text-danger'); infoLock.classList.remove('text-success');
        }
      }, 1000);
    }

    async function konfirmasiSelesai() {
      if (isSubmitting) return;
      const raguCount = Object.keys(ragu).filter(id => ragu[id]).length;
      if (raguCount > 0) return Swal.fire('Peringatan', `Masih ada ${raguCount} soal ditandai ragu!`, 'warning');
      const belumTerjawab = quest.filter(s => !jawUser[s.id]).length;
      if (belumTerjawab > 0) return Swal.fire('Peringatan', `Masih ada ${belumTerjawab} soal belum dijawab!`, 'warning');
      Swal.fire({ title: 'Akhiri Ujian?', text: "Jawaban tidak bisa diubah setelah dikirim.", icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Kirim!', cancelButtonText: 'Batal' }).then(res => { if (res.isConfirmed) kirimJawaban(); });
    }


    // ================== FUNGSI FINAL UNTUK SUBMISI DENGAN PARSING REDIS ==================
    /**
     * Submisi Request Dari client + proses skor final
     * sebenernya ini over-geared sih pake redis tapi gak masalah lah yang penting lancar
     * 
     * Asumsi pelaksanaan diikuti oleh 500 Siswa stimultan.
     * 
     * Code.gs  (API_SERVER)
     * Redis    (Temporary_DB)
     * Sheet    (Main_DB)
     * 
     * Estimasi Request ke Server:          ≈ 1025    Req/Ops   
     * Estimasi Request ke Redis            ≈ 7.140   Req/Ops
     * Estimasi Request Batch               ≈ 25      Batch (25 Array/Batch)
     * 
     * Durasi Eksekusi
     * 5–8 menit
     * 
     * LOG:
     * May 2, 2026, 6:39:07 AM	Debug	🚀 Memulai 156 request submit
     * PARALEL PENUH tanpa jeda...
     * 
     * May 2, 2026, 6:43:19 AM	Debug	✅ Selesai dalam 251.598 detik.
     * 
     * May 2, 2026, 6:43:19 AM	Debug	📊 Sukses: 156, Gagal: 0
     * 
     * 
     * ========================================================
     * 
     * @lemonsprite (https://github.com/lemonsprites/)
     * 
     * Lihat Code History di: https://github.com/lemonsprites/cbt-um
     * */
    async function kirimJawaban() {
      if (isSubmitting || statusUjian !== "AKTIF") return;
      await saveAllJawaban();
      // Langsung gunakan jawUser karena sudah berisi teks jawaban
      const jawabanTeks = { ...jawUser };
      const skorLokal = hitungSkorLokal(jawabanTeks, kunci);
      const payload = {
        token: currentToken,
        nama: currentNama,
        kelas: currentKelas,
        mapel: currentMapel,
        jawaban: jawabanTeks,
        kunci: kunci,
        pelanggaran: pelanggaran,
        username: currentUsername,
        loginVia: currentLoginVia
      };
      google.script.run
        .withSuccessHandler(async () => {
          await tandaiSudahUjianRedis(currentUsername, currentMapel);
          hapusLocalStorage();
          del(`active:${currentToken}:${currentUsername}`);
          resetAll();
        })
        .withFailureHandler(err => {
          console.error(err);
          Swal.fire('Peringatan', 'Gagal menyimpan jawaban ke server. Hubungi pengawas!', 'error').then(() => resetAll());
        })
        .simpanKeDatabaseFinal(payload);
      isSubmitting = true;
      statusUjian = "SELESAI";
      if (timerInterval) clearInterval(timerInterval);
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      await Swal.fire({
        title: 'Ujian Selesai!',
        html: `Selamat Ujian Selesai. Skor Anda: <strong style="font-size:2rem">${skorLokal}</strong>`,
        icon: 'success',
        confirmButtonText: 'OK'
      });
    }


    /**
         * Fungsi Reset buat ke default state saat selesai ujian
         * 
         * 
         * @lemonsprite (https://github.com/lemonsprites/)
         * 
         * Lihat Code History di: https://github.com/lemonsprites/cbt-um
         * */
    function resetAll() {
      quest = []; kunci = {}; jawUser = {}; ragu = {};
      idx = 0; sisa = 0; statusUjian = "OFF"; pelanggaran = 0;
      currentToken = ''; currentUsername = ''; currentNama = ''; currentKelas = ''; currentMapel = ''; currentLoginVia = '';
      isSubmitting = false;
      if (timerInterval) clearInterval(timerInterval);
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      if (currentToken && currentUsername) redisCommand('DEL', `active:${currentToken}:${currentUsername}`).catch(() => { });
      hapusLocalStorage();
      document.getElementById('view-exam').classList.add('d-none');
      document.getElementById('wrapper-timer').classList.add('d-none');
      document.getElementById('btn-reload').style.display = 'none';
      const loginDiv = document.getElementById('view-login');
      loginDiv.classList.remove('d-none');
      document.getElementById('in-user').value = '';
      document.getElementById('in-kelas').selectedIndex = 0;
      document.getElementById('in-token').value = '';
    }
  </script>
