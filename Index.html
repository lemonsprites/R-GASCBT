<!DOCTYPE html>
<html lang="id">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBT MTsN 1 CIAMIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --primary-color: #0d47a1;
      --accent-color: #ffca28;
    }

    body {
      background-color: #f8f9fa;
      font-family: "Noto Sans", sans-serif;
    }

    .navbar-cbt {
      background: var(--primary-color);
      border-bottom: 5px solid var(--accent-color);
      color: white;
    }

    .login-container {
      max-width: 450px;
      margin-top: 80px;
    }

    .card-login {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .q-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      background: white;
    }

    .btn-nomor {
      width: 45px;
      height: 45px;
      margin: 4px;
      font-weight: bold;
      border-radius: 8px;
    }

    .status-yakin {
      background-color: #0d6efd !important;
      color: white;
      border: none;
    }

    .status-ragu {
      background-color: #ffc107 !important;
      color: black;
      border: none;
    }

    .active-now {
      border: 3px solid #333 !important;
    }

    .opt-box {
      cursor: pointer;
      border: 1px solid #dee2e6;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: 0.3s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .opt-box:hover {
      background-color: #f1f3f5;
    }

    .opt-selected {
      background-color: #e3f2fd;
      border-color: #0d6efd;
      font-weight: 500;
    }

    .gambar-pertanyaan {
      max-width: 100%;
      height: auto;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .gambar-opsi {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #dee2e6;
      flex-shrink: 0;
    }

    .teks-opsi {
      align-items: center;
      flex: 1;
    }

    .opsi-badge {
      display: inline-block;
      font-weight: bold;
      margin-right: 8px;
      color: #0d6efd;
    }

    .d-none {
      display: none !important;
    }

    #timer-display {
      font-weight: bold;
      font-size: 1.2rem;
      color: #d32f2f;
      background: white;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .arabic-line {
      direction: rtl;
      text-align: right;
      font-family: 'Amiri', 'Traditional Arabic', 'Noto Sans Arabic', 'Tahoma', sans-serif;
      font-size: 1.8rem;
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }

    .latin-line {
      direction: ltr;
      text-align: left;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin-bottom: 0.5rem;
    }

    .rtl-opt {
      direction: rtl;
      text-align: right;
      font-family: 'Amiri', 'Traditional Arabic', 'Noto Sans Arabic', 'Tahoma', sans-serif;
      font-size: 1.4rem;
    }

    .rtl-opt .opsi-badge {
      float: left;
      margin-left: 8px;
      margin-right: 0;
    }

    .highlight {
      background-color: #ffeb3b;
      color: #000;
      padding: 0 4px;
      border-radius: 4px;
      font-weight: 500;
    }

    .btn-reload {
      background-color: #17a2b8;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 10px;
      width: 100%;
    }

    .btn-reload:hover {
      background-color: #138496;
    }

    .latin-line,
    .arabic-line,
    .teks-opsi {
      white-space: pre-wrap;
    }

    .stimulus-text {
      white-space: pre-wrap;
    }

    @media (max-width: 768px) {
      .q-card {
        padding: 1rem !important;
      }

      .btn-nomor {
        width: 40px;
        height: 40px;
        font-size: 0.8rem;
      }

      .opt-box {
        padding: 12px;
        gap: 8px;
      }

      .teks-opsi {
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .gambar-opsi {
        width: 80px;
        height: 80px;
        flex-shrink: 0;
      }

      .arabic-line {
        font-size: 1.3rem;
      }

      .latin-line {
        font-size: 1rem;
      }

      .stimulus-text {
        font-size: 0.9rem;
      }

      #timer-display {
        font-size: 0.9rem;
        padding: 3px 10px;
      }

      .btn-reload {
        font-size: 0.8rem;
      }
    }

    .latin-line,
    .arabic-line,
    .teks-opsi {
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }

    .opt-box {
      align-items: flex-start;
      width: 100%;
    }

    .opsi-badge {
      flex-shrink: 0;
    }
  </style>
</head>

    <div id="view-exam" class="row d-none">
      <div class="col-lg-8 mb-4">

          <div class="d-flex justify-content-between border-bottom pb-3 mb-4">
            <span id="txt-mapel" class="badge bg-secondary p-2">MAPEL</span><span id="txt-no"
              class="fw-bold text-primary">SOAL NOMOR 1</span>
          </div>

          <div id="info-lock" class="text-center mb-2 small text-danger fw-bold"></div>
          <button id="btn-selesai" class="btn btn-danger w-100 fw-bold py-2 shadow-sm" disabled
            onclick="konfirmasiSelesai()">SELESAI UJIAN</button>
          <button id="btn-reload" class="btn-reload" onclick="reloadJawabanTersimpan()" style="display:none;"><i

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // ==================== KONFIGURASI REDIS ====================
    const REDIS_ENDPOINT = "https://dear-monarch-83839.upstash.io";
    const REDIS_TOKEN = "gQAAAAAAAUd_AAIgcDE2Y2JmMTZhZWU5OGE0MmRkOTI3ZDc5ZTU1ZDYzNDIzZg";

    async function redisCommand(...args) {
      const response = await fetch(REDIS_ENDPOINT, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${REDIS_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(args)
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      return data.result;
    }
    async function hsetBatch(key, fieldValueMap) {
      const args = ['HSET', key];
      for (const [field, value] of Object.entries(fieldValueMap)) args.push(field, value);
      return redisCommand(...args);
    }
    async function hgetall(key) {
      const arr = await redisCommand('HGETALL', key);
      const obj = {};
      for (let i = 0; i < arr.length; i += 2) obj[arr[i]] = arr[i + 1];
      return obj;
    }
    async function exists(key) { return await redisCommand('EXISTS', key) === 1; }
    async function setex(key, seconds, value) { return await redisCommand('SETEX', key, seconds, value); }
    async function del(...keys) { return await redisCommand('DEL', ...keys); }

    // ==================== VARIABEL GLOBAL ====================
    let quest = [], kunci = {}, jawUser = {}, ragu = {}, stimMap = {};
    let idx = 0, sisa = 0, statusUjian = "OFF";
    let pelanggaran = 0;
    let currentToken = '', currentUsername = '', currentNama = '', currentKelas = '', currentMapel = '', currentLoginVia = '';
    let timerInterval = null;
    let isSubmitting = false;
    let currentRedisKey = '';
    let autoSaveInterval = null;
    let fullscreenWatchdog = null;
    let wakeLock = null;

    // Pelanggaran terpisah
    const lastViolationTimes = {};
    let gracePeriodEnd = 0;
    let pendingViolationTimer = null;
    const TOLERANSI_DETIK = 2;
    const cooldownMap = {
      blur: 3000,
      visibility: 3000,
      resize: 2000,
      'exit-fullscreen': 5000
    };

    let wasFullscreen = false;
    let fullscreenBypass = false;
    let lastFullscreenExitTime = 0;
    const FULLSCREEN_EXIT_COOLDOWN = 5000;

    let saveViolationTimeout;
    let lastSavedJawabanCount = 0;

    // ==================== LOCALSTORAGE BACKUP ====================
    function simpanKeLocalStorage() {
      if (!currentToken || !currentUsername) return;
      try { localStorage.setItem(`cbt_local_${currentToken}_${currentUsername}`, JSON.stringify(jawUser)); } catch (e) { console.error(e); }
    }
    function muatDariLocalStorage() {
      const key = `cbt_local_${currentToken}_${currentUsername}`;
      const data = localStorage.getItem(key);
      if (data) { Object.assign(jawUser, JSON.parse(data)); return true; }
      return false;
    }
    function hapusLocalStorage() {
      localStorage.removeItem(`cbt_local_${currentToken}_${currentUsername}`);
      // localStorage.removeItem(`violation_${currentToken}_${currentUsername}`);
    }

    function simpanPelanggaranKeLocalStorageDebounced() {
      clearTimeout(saveViolationTimeout);
      saveViolationTimeout = setTimeout(() => {
        if (!currentToken || !currentUsername) return;
        try { localStorage.setItem(`violation_${currentToken}_${currentUsername}`, pelanggaran); } catch (e) { }
      }, 5000);
    }
    function muatPelanggaranDariLocalStorage() {
      if (!currentToken || !currentUsername) return;
      const key = `violation_${currentToken}_${currentUsername}`;
      const stored = localStorage.getItem(key);
      if (stored !== null) pelanggaran = parseInt(stored, 10);
    }

    function setRedisKey(token, username) { currentRedisKey = `cbt:${token}:${username}`; }

    async function saveAllJawaban() {
      if (!currentRedisKey || Object.keys(jawUser).length === 0) return;
      try { await hsetBatch(currentRedisKey, jawUser); } catch (e) { console.error('Gagal simpan jawaban batch:', e); }
    }

    function startAutoSave() {
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      autoSaveInterval = setInterval(() => { if (statusUjian === "AKTIF") saveAllJawaban(); }, 600000);
    }
    window.addEventListener('beforeunload', () => { if (statusUjian === "AKTIF") saveAllJawaban(); });

    async function muatJawabanDariRedis() {
      const redisJawaban = await hgetall(currentRedisKey);
      let localJawaban = {};
      try {
        const data = localStorage.getItem(`cbt_local_${currentToken}_${currentUsername}`);
        if (data) localJawaban = JSON.parse(data);
      } catch (e) { }
      let merged = { ...redisJawaban, ...localJawaban };
      for (let id in merged) {
        const val = merged[id];
        if (typeof val === 'string' && val.includes('_')) {
          const soal = quest.find(q => q.id === id);
          if (soal) {
            const idx = parseInt(val.split('_')[1]);
            if (soal.opsi && soal.opsi[idx]) merged[id] = soal.opsi[idx].text;
          }
        }
      }
      Object.assign(jawUser, merged);
      lastSavedJawabanCount = Object.keys(jawUser).length;
      if (Object.keys(jawUser).length > 0) {
        try {
          await hsetBatch(currentRedisKey, jawUser);
          hapusLocalStorage();
        } catch (e) { console.error('Gagal sinkronisasi restore:', e); }
      }
    }
    async function cekSudahUjianRedis(username, mapel) { return await exists(`done:${mapel}:${username}`); }

    function hitungSkorLokal(jawabanTeks, kunci) {
      let benar = 0;
      const total = Object.keys(kunci).length;
      for (let id in kunci) {
        const userJawab = jawabanTeks[id] || "";
        const kunciJawab = kunci[id];
        if (Array.isArray(kunciJawab)) {
          const userArr = Array.isArray(userJawab) ? userJawab : [userJawab];
          if (userArr.sort().join() === kunciJawab.sort().join()) benar++;
        } else { if (userJawab === kunciJawab) benar++; }
      }
      let skorMentah = total > 0 ? Math.round((benar / total) * 100) : 0;
      const pengurang = 5 * Math.floor(pelanggaran / 3);
      return Math.max(0, skorMentah - pengurang);
    }

    // ==================== PELANGGARAN ====================
    function catatPelanggaran() {
      if (statusUjian !== "AKTIF" || Date.now() < gracePeriodEnd) return;
      pelanggaran++;
      simpanPelanggaranKeLocalStorageDebounced();
      if (pelanggaran === 1) {
        Swal.fire('Peringatan 1', 'Jangan pindah tab atau biarkan layar mati terlalu lama!', 'warning');
      } else if (pelanggaran === 2) {
        Swal.fire('Peringatan 2', 'Segera kembali ke ujian. Pelanggaran berulang akan mengurangi skor.', 'error');
      } else if (pelanggaran === 3) {
        Swal.fire('Peringatan 3', 'Skor Anda akan dikurangi 5 poin. Tetap fokus!', 'error');
      } else if (pelanggaran >= 5) {
        Swal.fire({
          title: 'Terlalu Banyak Pelanggaran',
          text: 'Ujian otomatis dikirim karena pelanggaran berulang.',
          icon: 'error',
          confirmButtonText: 'OK'
        }).then(() => {
          if (!isSubmitting && statusUjian === 'AKTIF') kirimJawaban();
        });
      } else {
        Swal.fire('Peringatan', `Pelanggaran ke-${pelanggaran}. Awas, skor dapat dipotong.`, 'error');
      }
    }

    function catatPelanggaranDenganCooldown(jenis) {
      if (statusUjian !== "AKTIF" || Date.now() < gracePeriodEnd) return;
      const now = Date.now();
      const cd = cooldownMap[jenis] || 2000;
      if (now - (lastViolationTimes[jenis] || 0) < cd) return;
      lastViolationTimes[jenis] = now;
      catatPelanggaran();
    }

    // ==================== EVENT LISTENER ====================
    window.addEventListener('blur', () => {
      if (statusUjian !== "AKTIF" || Date.now() < gracePeriodEnd) return;
      if (document.hidden) catatPelanggaranDenganCooldown('blur');
    });

    document.addEventListener('visibilitychange', () => {
      if (statusUjian !== "AKTIF" || Date.now() < gracePeriodEnd) return;
      if (document.hidden) {
        if (pendingViolationTimer) clearTimeout(pendingViolationTimer);
        pendingViolationTimer = setTimeout(() => {
          catatPelanggaranDenganCooldown('visibility');
          pendingViolationTimer = null;
        }, TOLERANSI_DETIK * 1000);
      } else {
        if (pendingViolationTimer) {
          clearTimeout(pendingViolationTimer);
          pendingViolationTimer = null;
        }
        requestWakeLock();
      }
    });

    window.addEventListener('resize', () => {
      if (statusUjian !== "AKTIF" || Date.now() < gracePeriodEnd) return;
      if (!isFullscreen()) return;
      const screenW = window.screen.width;
      const screenH = window.screen.height;
      const winW = window.outerWidth;
      const winH = window.outerHeight;
      const ratioDiff = Math.abs(winW / screenW - 1) + Math.abs(winH / screenH - 1);
      if (ratioDiff > 0.1) catatPelanggaranDenganCooldown('resize');
    });

    // ==================== FULLSCREEN & WAKE LOCK ====================
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {
            if (statusUjian === "AKTIF") requestWakeLock();
          });
        } catch (err) { console.warn('Wake Lock gagal:', err); }
      }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        wakeLock.release().then(() => { wakeLock = null; }).catch(console.error);
      }
    }

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function enterFullscreen() {
      const docEl = document.documentElement;
      if (!isFullscreen()) {
        try { docEl.requestFullscreen?.() || docEl.webkitRequestFullscreen?.() || docEl.msRequestFullscreen?.(); } catch (err) { console.warn(err); }
      }
    }

    function onFullscreenChange() {
      const nowFullscreen = isFullscreen();
      if (wasFullscreen && !nowFullscreen && !fullscreenBypass) {
        const now = Date.now();
        if (now - lastFullscreenExitTime < FULLSCREEN_EXIT_COOLDOWN) return;
        lastFullscreenExitTime = now;
        catatPelanggaranDenganCooldown('exit-fullscreen');
        setTimeout(() => {
          if (statusUjian === "AKTIF" && !isFullscreen() && !fullscreenBypass) enterFullscreen();
        }, 500);
      }
      wasFullscreen = nowFullscreen;
    }

    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    function startFullscreenWatchdog() {
      if (fullscreenWatchdog) clearInterval(fullscreenWatchdog);
      fullscreenWatchdog = setInterval(() => {
        if (statusUjian !== "AKTIF" || fullscreenBypass) return;
        if (!isFullscreen()) enterFullscreen();
      }, 2000);
    }

    function stopFullscreenWatchdog() {
      if (fullscreenWatchdog) {
        clearInterval(fullscreenWatchdog);
        fullscreenWatchdog = null;
      }
    }

    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
      }
      if (e.ctrlKey && e.code === 'Space') {
        e.preventDefault();
        fullscreenBypass = true;
        if (isFullscreen()) document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        if (statusUjian === "AKTIF") Swal.fire('Admin Bypass', 'Anda keluar dari mode layar penuh. Ujian tetap berjalan.', 'info');
        setTimeout(() => { fullscreenBypass = false; }, 10000);
      }
    });

    // ==================== UI & NAVIGASI ====================
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function formatMarkdownInline(text) {
      if (!text) return '';
      return text
        .replace(/\*\*([\s\S]*?)\*\*/g, '<strong>$1</strong>')
        .replace(/__([\s\S]*?)__/g, '<strong>$1</strong>')
        .replace(/\*([\s\S]*?)\*/g, '<em>$1</em>')
        .replace(/_([\s\S]*?)_/g, '<em>$1</em>')
        .replace(/==([\s\S]*?)==/g, '<mark class="highlight">$1</mark>')
        .replace(/~~([\s\S]*?)~~/g, '<del>$1</del>')
        .replace(/\+\+([\s\S]*?)\+\+/g, '<u>$1</u>')
        .replace(/`([\s\S]*?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    function showQuest() {
      const s = quest[idx]; if (!s) return;
      document.getElementById('txt-no').innerHTML = `SOAL NOMOR ${idx + 1}`;
      let pertanyaanTeks = s.pertanyaan;
      let stimHtml = '';
      const stimMatch = pertanyaanTeks.match(/\[stimulus:([^\]]+)\]/);
      if (stimMatch && stimMap[stimMatch[1]]) {
        stimHtml = `<div class="alert alert-info stimulus-text mb-3" style="white-space: pre-wrap;">${formatMarkdownInline(stimMap[stimMatch[1]])}</div>`;
        pertanyaanTeks = pertanyaanTeks.replace(/\[stimulus:[^\]]+\]/, '').trim();
      }
      const lines = pertanyaanTeks.split(/\r?\n/);
      let pertanyaanHtml = '';
      lines.forEach(line => {
        line = line.trim(); if (line === '') return;
        const hasArabic = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(line);
        const dir = hasArabic ? 'rtl' : 'ltr';
        const className = hasArabic ? 'arabic-line' : 'latin-line';
        pertanyaanHtml += `<div class="${className}" dir="${dir}">${formatMarkdownInline(line)}</div>`;
      });
      let html = `<div class="fs-5 mb-4 fw-medium">${stimHtml}${pertanyaanHtml}</div>`;
      if (s.gambarPertanyaan) {
        html += `<div class="text-center mb-3"><img src="${s.gambarPertanyaan}" class="gambar-pertanyaan" onerror="this.style.display='none'" alt="Gambar soal"></div>`;
      }
      if (s.opsi && s.opsi.length > 0) {
        s.opsi.forEach((opsi, optIndex) => {
          const isSelected = String(jawUser[s.id]) === opsi.text;
          const optionLetter = String.fromCharCode(65 + optIndex);
          const optKey = `${s.id}_${optIndex}`;
          const hasArabicOpt = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(opsi.text);
          const optDir = hasArabicOpt ? 'rtl' : 'ltr';
          const optClass = hasArabicOpt ? 'rtl-opt' : '';
          html += `<div class="opt-box ${isSelected ? 'opt-selected' : ''} ${optClass}" onclick="pilih('${s.id}', '${optKey}')" dir="${optDir}">
        <div class="opsi-badge">${optionLetter}.</div>`;
          if (opsi.imageUrl) html += `<img src="${opsi.imageUrl}" class="gambar-opsi" onerror="this.style.display='none'" alt="Gambar opsi">`;
          html += `<div class="teks-opsi">${formatMarkdownInline(opsi.text || `Pilihan ${optionLetter}`)}</div>`;
          if (isSelected) html += `<i class="bi bi-check-circle-fill text-primary fs-5"></i>`;
          html += `</div>`;
        });
      } else {
        html += '<p class="text-muted">Tidak ada opsi jawaban</p>';
      }
      document.getElementById('area-soal').innerHTML = html;
    }

    function pilih(soalId, optKey) {
      const soal = quest.find(q => q.id === soalId);
      let selectedText = "";
      if (soal && optKey) {
        const optIndex = parseInt(optKey.split('_')[1]);
        if (soal.opsi && soal.opsi[optIndex]) selectedText = soal.opsi[optIndex].text;
      }
      if (jawUser[soalId] === selectedText) return;
      jawUser[soalId] = selectedText;
      delete ragu[soalId];
      showQuest(); showNav();
      simpanKeLocalStorage();
      const currentCount = Object.keys(jawUser).length;
      if (currentCount % 5 === 0 && currentCount !== lastSavedJawabanCount) {
        lastSavedJawabanCount = currentCount;
        saveAllJawaban().catch(e => console.error('Gagal autosave:', e));
      }
    }

    function move(n) {
      if (idx + n >= 0 && idx + n < quest.length) {
        idx += n; showQuest(); showNav();
      }
    }

    function setRagu() {
      const s = quest[idx]; if (!s) return;
      if (!jawUser[s.id]) return Swal.fire('Info', 'Pilih jawaban dulu sebelum memberi tanda ragu-ragu', 'info');
      ragu[s.id] = !ragu[s.id]; showNav();
      Swal.fire('Info', `Soal ${idx + 1} ${ragu[s.id] ? 'ditandai ragu-ragu' : 'tidak ragu lagi'}`, 'info', 1000);
    }

    function showNav() {
      let h = '';
      quest.forEach((s, i) => {
        let cls = 'btn-outline-secondary';
        if (ragu[s.id]) cls = 'status-ragu';
        else if (jawUser[s.id]) cls = 'status-yakin';
        let act = i === idx ? 'active-now' : '';
        h += `<button class="btn btn-nomor ${cls} ${act}" onclick="navigasiKe(${i})">${i + 1}</button>`;
      });
      document.getElementById('area-nav').innerHTML = h;
      document.getElementById('info-lock').innerHTML = `<i class="bi bi-check-circle"></i> Terjawab: ${Object.keys(jawUser).length}/${quest.length}`;
    }

    function navigasiKe(tujuan) { idx = tujuan; showQuest(); showNav(); }

    // ==================== TIMER ====================
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (sisa <= 0) { kirimJawaban(); return; }
      const display = document.getElementById('timer-display');
      const infoLock = document.getElementById('info-lock');
      const btnSelesai = document.getElementById('btn-selesai');
      timerInterval = setInterval(() => {
        if (statusUjian !== "AKTIF") { clearInterval(timerInterval); return; }
        if (sisa <= 0) { clearInterval(timerInterval); kirimJawaban(); return; }
        sisa--;
        let h = Math.floor(sisa / 3600), m = Math.floor((sisa % 3600) / 60), s = sisa % 60;
        display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        if (sisa <= 600) {
          btnSelesai.disabled = false;
          infoLock.innerHTML = '<i class="bi bi-unlock-fill"></i> Tombol Selesai Aktif (waktu kritis)';
          infoLock.classList.remove('text-danger'); infoLock.classList.add('text-success');
        } else {
          btnSelesai.disabled = true;
          let menitTunggu = Math.floor((sisa - 600) / 60);
          let detikTunggu = (sisa - 600) % 60;
          infoLock.innerHTML = `<i class="bi bi-lock-fill"></i> Selesai aktif dalam: ${menitTunggu}:${detikTunggu.toString().padStart(2, '0')} menit`;
          infoLock.classList.add('text-danger'); infoLock.classList.remove('text-success');
        }
      }, 1000);
    }

    async function konfirmasiSelesai() {
      if (isSubmitting) return;
      const raguCount = Object.keys(ragu).filter(id => ragu[id]).length;
      if (raguCount > 0) return Swal.fire('Peringatan', `Masih ada ${raguCount} soal ditandai ragu!`, 'warning');
      const belumTerjawab = quest.filter(s => !jawUser[s.id]).length;
      if (belumTerjawab > 0) return Swal.fire('Peringatan', `Masih ada ${belumTerjawab} soal belum dijawab!`, 'warning');
      Swal.fire({
        title: 'Akhiri Ujian?',
        text: "Jawaban tidak bisa diubah setelah dikirim.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Ya, Kirim!',
        cancelButtonText: 'Batal'
      }).then(res => { if (res.isConfirmed) kirimJawaban(); });
    }

    // ==================== LOGIN & KIRIM ====================
    async function mulaiProses() {
      const userInput = document.getElementById('in-user').value;
      const k = document.getElementById('in-kelas').value;
      const t = document.getElementById('in-token').value.trim();
      if (!userInput || !k || !t) return Swal.fire('Error', 'Lengkapi semua field!', 'error');
      currentToken = t; currentKelas = k; setRedisKey(currentToken, '');
      Swal.fire({ title: 'Menyiapkan Soal...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      google.script.run
        .withSuccessHandler(async (res) => {
          if (res.status === "success") {
            currentUsername = res.username; currentNama = res.namaSiswa; currentLoginVia = res.loginVia;
            currentMapel = res.mapel; sisa = res.sisaWaktuServer; stimMap = res.stimulus || {};
            quest = res.soal; kunci = res.kunci;
            muatPelanggaranDariLocalStorage();
            jawUser = {}; setRedisKey(currentToken, currentUsername);
            const sudah = await cekSudahUjianRedis(currentUsername, currentMapel);
            if (sudah) { Swal.fire('Info', 'Anda sudah mengikuti ujian ini!', 'info').then(() => resetAll()); return; }
            if (sisa <= 0) { Swal.fire('Waktu Habis', 'Sesi ujian telah berakhir.', 'error').then(() => resetAll()); return; }
            await muatJawabanDariRedis();
            lastSavedJawabanCount = Object.keys(jawUser).length;
            Swal.fire({
              title: `Selamat datang, ${res.namaSiswa}!`,
              html: `Anda akan mengerjakan <strong>${res.mapel}</strong>.<br>Waktu tersisa: ${Math.floor(sisa / 60)} menit.<br><span style="color:green">Jawaban dipulihkan: ${Object.keys(jawUser).length} soal</span>`,
              icon: 'success',
              confirmButtonText: `${Object.keys(jawUser).length > 0 ? 'Lanjutkan' : 'Mulai'} Ujian Sekarang`,
              allowOutsideClick: false
            }).then(() => {
              enterFullscreen();
              wasFullscreen = isFullscreen();
              statusUjian = "AKTIF";
              gracePeriodEnd = Date.now() + 5000;
              startFullscreenWatchdog();
              redisCommand('SET', `active:${currentToken}:${currentUsername}`, '1');
              document.getElementById('view-login').classList.add('d-none');
              document.getElementById('view-exam').classList.remove('d-none');
              document.getElementById('wrapper-timer').classList.remove('d-none');
              document.getElementById('txt-mapel').innerText = res.mapel;
              document.getElementById('btn-reload').style.display = 'block';
              idx = 0; showQuest(); showNav();
              startTimer(); startAutoSave();
            });
          } else { Swal.fire('Gagal', res.pesan, 'error'); }
        })
        .withFailureHandler(err => Swal.fire('Error', 'Koneksi bermasalah: ' + err.message, 'error'))
        .cekLogin(t, userInput, k);
    }

    async function kirimJawaban() {
      if (isSubmitting || statusUjian !== "AKTIF") return;
      isSubmitting = true;
      statusUjian = "SELESAI";
      if (timerInterval) clearInterval(timerInterval);
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      stopFullscreenWatchdog();
      releaseWakeLock();

      await saveAllJawaban();
      const jawabanTeks = { ...jawUser };
      const skorLokal = hitungSkorLokal(jawabanTeks, kunci);
      const payload = {
        timestamp: Date.now(),
        token: currentToken,
        nama: currentNama,
        kelas: currentKelas,
        mapel: currentMapel,
        jawaban: jawabanTeks,
        kunci: kunci,
        pelanggaran: pelanggaran,
        username: currentUsername,
        loginVia: currentLoginVia
      };

      Swal.fire({
        title: 'Mengirim jawaban...',
        text: 'Jangan tutup halaman ini',
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => { Swal.showLoading(); }
      });

      const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfnQDzLWXucg2hlQuNFtemNJv_2pKqitn43PPNWCO-9WaOwhBGmk9eZwSjeoUClp2M/exec";

      // 🔥 Backup keepalive – pasti terkirim
      fetch(APPSCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        keepalive: true,
        headers: { 'Content-Type': 'application/json' }
      }).catch(() => { });

      // Tunggu google.script.run untuk memastikan & tampilkan skor
      try {
        const serverSkor = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .simpanKeDatabaseFinal(payload);
        });

        // Jika server mengembalikan -1, artinya fetch keepalive sudah memproses
        if (serverSkor === -1) {
          console.log('Duplikat terdeteksi, data sudah dikirim via fetch.');
        }

        hapusLocalStorage();
        del(`active:${currentToken}:${currentUsername}`).catch(() => { });

        await Swal.fire({
          title: 'Ujian Selesai!',
          html: `Skor Anda: <strong style="font-size:2rem">${skorLokal}</strong>`,
          icon: 'success',
          confirmButtonText: 'OK'
        });
        localStorage.removeItem(`violation_${currentToken}_${currentUsername}`);
        resetAll();

      } catch (error) {
        // google.script.run gagal total (network error)
        // fetch keepalive mungkin tetap sukses
        console.error('google.script.run gagal:', error);
        Swal.fire({
          icon: 'warning',
          title: 'Pengiriman Selesai?',
          text: 'Jawaban Anda sudah dikirim melalui jalur cadangan. Jika skor tidak muncul, hubungi pengawas.',
          confirmButtonText: 'OK'
        }).then(() => {
          hapusLocalStorage(); // tetap bersihkan, karena kemungkinan data sudah aman
          del(`active:${currentToken}:${currentUsername}`).catch(() => { });
          resetAll();
        });
      }
    }

    function resetAll() {
      quest = []; kunci = {}; jawUser = {}; ragu = {}; idx = 0; sisa = 0; statusUjian = "OFF"; pelanggaran = 0;
      currentToken = ''; currentUsername = ''; currentNama = ''; currentKelas = ''; currentMapel = ''; currentLoginVia = '';
      isSubmitting = false;
      if (timerInterval) clearInterval(timerInterval);
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      stopFullscreenWatchdog();
      releaseWakeLock();
      if (currentToken && currentUsername) redisCommand('DEL', `active:${currentToken}:${currentUsername}`).catch(() => { });
      hapusLocalStorage();
      document.getElementById('view-exam').classList.add('d-none');
      document.getElementById('wrapper-timer').classList.add('d-none');
      document.getElementById('btn-reload').style.display = 'none';
      const loginDiv = document.getElementById('view-login');
      loginDiv.classList.remove('d-none');
      document.getElementById('in-user').value = ''; document.getElementById('in-kelas').selectedIndex = 0; document.getElementById('in-token').value = '';
    }

    async function reloadJawabanTersimpan() {
      if (!currentToken || !currentUsername) return Swal.fire('Info', 'Data session tidak lengkap', 'info');
      Swal.fire({ title: 'Memuat ulang jawaban...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      await muatJawabanDariRedis();
      showQuest(); showNav();
      Swal.fire('Sukses', `Berhasil memuat ${Object.keys(jawUser).length} jawaban tersimpan`, 'success', 1500);
    }

    // ==================== KONEKSI OFFLINE ====================
    let pendingSync = false;
    function updateConnectionStatus() {
      const isOnline = navigator.onLine;
      if (isOnline) {
        if (pendingSync && statusUjian === 'AKTIF') {
          saveAllJawaban().then(() => {
            pendingSync = false;
            Swal.fire({ icon: 'success', title: 'Tersinkronisasi', text: 'Jawaban disimpan ke server.', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
          }).catch(e => console.error('Gagal sync:', e));
        }
      } else {
        pendingSync = true;
        simpanKeLocalStorage();
        Swal.fire({ icon: 'warning', title: 'Koneksi Terputus', text: 'Jawaban disimpan lokal. Akan disinkronkan saat online.', toast: true, position: 'top-end', showConfirmButton: false, timer: 4000 });
      }
    }
    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);
    window.addEventListener('load', updateConnectionStatus);

    // Tips awal
    window.addEventListener('load', () => {
      Swal.fire({ icon: 'info', title: 'Tips Ujian', text: 'Gunakan mode layar penuh untuk kenyamanan. Fullscreen akan aktif saat ujian dimulai.', toast: true, position: 'top-end', showConfirmButton: false, timer: 4000, timerProgressBar: true });
    });
  </script>
</body>
