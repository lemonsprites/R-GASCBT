  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>

<body>
  <!-- Navbar, login, exam elements (sama seperti sebelumnya) -->
  ...

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // ==================== VARIABEL GLOBAL ====================
    let quest = [], kunci = {}, jawUser = {}, ragu = {};
    let idx = 0, sisa = 0, statusUjian = "OFF";
    let pelanggaran = 0;
    let currentToken = '', currentUsername = '', currentNama = '', currentKelas = '', currentMapel = '', currentLoginVia = '';
    let isSubmitting = false;

    // ===== OPTIMASI BATCH DEBOUNCE =====
    let isDirty = false;
    let syncTimer = null;
    let timerInterval = null;

    // ==================== DETEKSI PINDAH TAB ====================
    window.onblur = () => {
      if (statusUjian === "AKTIF") {
        pelanggaran++;
        if (pelanggaran === 1) Swal.fire('Peringatan 1', 'Jangan pindah tab atau membuka aplikasi lain!', 'warning');
        else if (pelanggaran === 2) Swal.fire('Peringatan 2', 'Sekali lagi melanggar, ujian akan otomatis dikirim!', 'error');
        else if (pelanggaran >= 3) {
          Swal.fire('Diskualifikasi', 'Anda melanggar 3 kali. Jawaban dikirim otomatis.', 'error').then(() => kirimJawaban());
        }
      }
    };

    // ==================== RELOAD JAWABAN ====================
    function reloadJawabanTersimpan() {
      if (!currentToken || !currentUsername || !currentMapel) {
        Swal.fire('Info', 'Data session tidak lengkap', 'info');
        return;
      }
      Swal.fire({ title: 'Memuat ulang jawaban...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run
        .withSuccessHandler(jawaban => {
          if (jawaban && typeof jawaban === 'object') {
            Object.assign(jawUser, jawaban);
            showQuest();
            showNav();
            Swal.fire('Sukses', `Berhasil memuat ${Object.keys(jawaban).length} jawaban tersimpan`, 'success', 1500);
          } else {
            Swal.fire('Info', 'Tidak ada jawaban tersimpan', 'info', 1500);
          }
        })
        .withFailureHandler(err => {
          Swal.fire('Error', 'Gagal memuat jawaban: ' + err.message, 'error');
        })
        .ambilJawabanSementara(currentToken, currentUsername, currentMapel);
    }

    // ==================== LOGIN ====================
    function mulaiProses() {
      const userInput = document.getElementById('in-user').value;
      const k = document.getElementById('in-kelas').value;
      const t = document.getElementById('in-token').value;
      if (!userInput || !k || !t) return Swal.fire('Error', 'Lengkapi semua field!', 'error');
      currentToken = t;
      currentKelas = k;
      Swal.fire({ title: 'Menyiapkan Soal...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run
        .withSuccessHandler(res => {
          if (res.status === "success") {
            quest = res.soal;
            kunci = res.kunci;
            currentMapel = res.mapel;
            currentUsername = res.username;
            currentNama = res.namaSiswa;
            currentLoginVia = res.loginVia;
            sisa = res.sisaWaktuServer;
            jawUser = res.jawabanTersimpan || {};
            if (sisa <= 0) {
              Swal.fire('Waktu Habis', 'Sesi ujian sudah berakhir.', 'error').then(() => location.reload());
              return;
            }
            Swal.fire({
              title: 'Login Berhasil!',
              html: `Selamat mengerjakan, <strong>${res.namaSiswa}</strong>!<br>
                     <span style="color:green">Jawaban dipulihkan: ${Object.keys(jawUser).length} soal</span>`,
              icon: 'success',
              confirmButtonText: `${Object.keys(jawUser).length > 0 ? 'Lanjutkan' : 'Mulai'} Ujian Sekarang`,
              allowOutsideClick: false
            }).then((result) => {
              if (result.isConfirmed) {
                enterFullscreen();
                statusUjian = "AKTIF";
                document.getElementById('view-login').classList.add('d-none');
                document.getElementById('view-exam').classList.remove('d-none');
                document.getElementById('wrapper-timer').classList.remove('d-none');
                document.getElementById('txt-mapel').innerText = res.mapel;
                document.getElementById('btn-reload').style.display = 'block';
                idx = 0;
                showQuest();
                showNav();
                startTimer();
              }
            });
          } else {
            Swal.fire('Gagal', res.pesan, 'error');
          }
        })
        .withFailureHandler(err => Swal.fire('Error', 'Koneksi bermasalah: ' + err.message, 'error'))
        .cekLogin(t, userInput, k);
    }

    // ==================== TAMPIL SOAL & MARKDOWN ====================
    function showQuest() { /* ... sama seperti sebelumnya ... */ }
    function formatMarkdownInline(text) { /* ... sama seperti sebelumnya ... */ }

    // ==================== PILIH JAWABAN (DEBOUNCE 10 DETIK) ====================
    function pilih(soalId, optKey) {
      jawUser[soalId] = optKey;
      isDirty = true;
      delete ragu[soalId];
      showQuest();
      showNav();
      if (syncTimer) clearTimeout(syncTimer);
      syncTimer = setTimeout(() => triggerSync(), 10000); // 10 detik debounce
    }

    function triggerSync() {
      if (!isDirty || statusUjian !== "AKTIF") return;
      console.log("Sync batch ke server...");
      google.script.run
        .withSuccessHandler(() => {
          console.log("Batch sync OK");
          isDirty = false;
        })
        .withFailureHandler(() => console.warn("Batch sync gagal, akan dicoba lagi"))
        .simpanMassal(currentToken, currentUsername, currentMapel, jawUser);
    }

    // ==================== RAGU & NAVIGASI ====================
    function setRagu() { /* ... sama ... */ }
    function showNav() { /* ... sama ... */ }
    function move(n) {
      if (idx + n >= 0 && idx + n < quest.length) {
        if (isDirty) triggerSync();
        idx += n;
        showQuest();
        showNav();
      }
    }
    function navigasiKe(tujuan) {
      if (isDirty) triggerSync();
      idx = tujuan;
      showQuest();
      showNav();
    }

    // ==================== TIMER (tanpa simpan sisa waktu ke server) ====================
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (sisa <= 0) { kirimJawaban(); return; }
      const display = document.getElementById('timer-display');
      const infoLock = document.getElementById('info-lock');
      const btnSelesai = document.getElementById('btn-selesai');
      timerInterval = setInterval(() => {
        if (statusUjian !== "AKTIF") { clearInterval(timerInterval); return; }
        if (sisa <= 0) { clearInterval(timerInterval); kirimJawaban(); return; }
        sisa--;
        let h = Math.floor(sisa/3600), m = Math.floor((sisa%3600)/60), s = sisa%60;
        display.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        const totalSoal = quest.length, terjawab = Object.keys(jawUser).length;
        const isSemuaTerjawab = terjawab >= totalSoal && totalSoal > 0;
        const isWaktuKritis = sisa <= 600;
        if (isSemuaTerjawab || isWaktuKritis) {
          infoLock.innerHTML = isSemuaTerjawab ? `<i class="bi bi-unlock-fill"></i> Semua Soal Terjawab` : `<i class="bi bi-unlock-fill"></i> Tombol Selesai Terbuka`;
          infoLock.classList.remove('text-danger'); infoLock.classList.add('text-success');
          btnSelesai.disabled = false;
        } else {
          let sisaKunci = sisa - 600, mk = Math.floor(sisaKunci/60), sk = sisaKunci%60;
          infoLock.innerHTML = `<i class="bi bi-lock-fill"></i> Selesai aktif dlm: ${mk}:${sk.toString().padStart(2,'0')} (atau jawab semua)`;
          infoLock.classList.add('text-danger'); infoLock.classList.remove('text-success');
          btnSelesai.disabled = true;
        }
        // TIDAK ADA panggilan simpanSisaWaktu ke server
      }, 1000);
    }

    // ==================== KIRIM JAWABAN FINAL ====================
    function konfirmasiSelesai() {
      if (isSubmitting) return;
      if (Object.keys(ragu).some(id => ragu[id])) {
        return Swal.fire('Peringatan', `Masih ada ${Object.keys(ragu).filter(id=>ragu[id]).length} soal yang ditandai RAGU-RAGU!`, 'warning');
      }
      if (quest.filter(s => !jawUser[s.id]).length > 0) {
        return Swal.fire('Peringatan', `Masih ada ${quest.filter(s=>!jawUser[s.id]).length} soal yang belum dijawab!`, 'warning');
      }
      Swal.fire({
        title: 'Akhiri Ujian?',
        text: "Jawaban yang sudah dikirim tidak bisa diubah.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Ya, Kirim!',
        cancelButtonText: 'Batal'
      }).then(res => { if (res.isConfirmed) kirimJawaban(); });
    }

    function kirimJawaban() {
      if (isSubmitting || statusUjian !== "AKTIF") return;
      isSubmitting = true;
      statusUjian = "SELESAI";
      if (timerInterval) clearInterval(timerInterval);
      // Sinkronkan jawaban terakhir sebelum submit
      if (isDirty) triggerSync();
      // Tunggu sebentar agar batch terkirim (jika perlu)
      setTimeout(() => {
        Swal.fire({ title: 'Mengirim Jawaban...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const jawabanTeks = {};
        quest.forEach(soal => {
          const optKey = jawUser[soal.id];
          if (optKey) {
            const optIndex = parseInt(optKey.split('_')[1]);
            if (soal.opsi && soal.opsi[optIndex]) jawabanTeks[soal.id] = soal.opsi[optIndex].text;
          } else jawabanTeks[soal.id] = "";
        });
        const payload = {
          token: currentToken, nama: currentNama, kelas: currentKelas, mapel: currentMapel,
          jawaban: jawabanTeks, kunci: kunci, pelanggaran, username: currentUsername, loginVia: currentLoginVia
        };
        google.script.run
          .withSuccessHandler(skor => {
            Swal.fire('Berhasil!', `Ujian Selesai. Skor Anda: ${skor}`, 'success').then(() => resetAll());
          })
          .withFailureHandler(err => {
            console.error(err);
            Swal.fire('Error', 'Gagal menyimpan jawaban: ' + err.message, 'error').then(() => resetAll());
          })
          .simpanKeDatabaseFinal(payload);
      }, 500);
    }

    function resetAll() {
      // reset semua variabel global dan UI
      quest = []; kunci = {}; jawUser = {}; ragu = {}; idx = 0; sisa = 0; statusUjian = "OFF";
      pelanggaran = 0; currentToken = ''; currentUsername = ''; currentNama = ''; currentKelas = ''; currentMapel = ''; currentLoginVia = '';
      syncTimer = null; isDirty = false; lastSavedTime = null;
      isSubmitting = false;
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('view-exam').classList.add('d-none');
      document.getElementById('wrapper-timer').classList.add('d-none');
      document.getElementById('btn-reload').style.display = 'none';
      const loginDiv = document.getElementById('view-login');
      loginDiv.classList.remove('d-none');
      document.getElementById('in-user').value = '';
      document.getElementById('in-kelas').selectedIndex = 0;
      document.getElementById('in-token').value = '';
      exitFullscreen();
    }
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    // ==================== FULLSCREEN ====================
    let fullscreenBypass = false;
    function enterFullscreen() {
      const docEl = document.documentElement;
      try { if (docEl.requestFullscreen) docEl.requestFullscreen(); else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen(); else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen(); } catch (err) { console.warn("Fullscreen gagal:", err.message); }
    }
    function exitFullscreen() { const exitMethod = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen; if (exitMethod) exitMethod.call(document); }
    function onFullscreenChange() {
      const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (statusUjian === "AKTIF" && !isFullscreen && !fullscreenBypass) Swal.fire('Peringatan', 'Ujian harus dalam mode layar penuh!', 'warning').then(() => enterFullscreen());
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    window.addEventListener('keydown', function (e) { if (e.ctrlKey && e.code === 'Space') { e.preventDefault(); if (statusUjian === "AKTIF") { fullscreenBypass = true; exitFullscreen(); Swal.fire('Admin Bypass', 'Anda keluar dari mode layar penuh. Ujian tetap berjalan.', 'info'); } } });
  </script>
</body>

</html>
