<!DOCTYPE html>
<html lang="id">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBT MTsN 1 CIAMIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    /* style tidak berubah, sama seperti sebelumnya (tidak ditulis ulang untuk menghemat tempat) */
    :root {
      --primary-color: #0d47a1;
      --accent-color: #ffca28;
    }

    body {
      background-color: #f8f9fa;
      font-family: "Noto Sans", sans-serif;
    }

    .navbar-cbt {
      background: var(--primary-color);
      border-bottom: 5px solid var(--accent-color);
      color: white;
    }

    .login-container {
      max-width: 450px;
      margin-top: 80px;
    }

    .card-login {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .q-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      background: white;
    }

    .btn-nomor {
      width: 45px;
      height: 45px;
      margin: 4px;
      font-weight: bold;
      border-radius: 8px;
    }

    .status-yakin {
      background-color: #0d6efd !important;
      color: white;
      border: none;
    }

    .status-ragu {
      background-color: #ffc107 !important;
      color: black;
      border: none;
    }

    .active-now {
      border: 3px solid #333 !important;
    }

    .opt-box {
      cursor: pointer;
      border: 1px solid #dee2e6;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: 0.3s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .opt-box:hover {
      background-color: #f1f3f5;
    }

    .opt-selected {
      background-color: #e3f2fd;
      border-color: #0d6efd;
      font-weight: 500;
    }

    .gambar-pertanyaan {
      max-width: 100%;
      height: auto;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .gambar-opsi {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #dee2e6;
      flex-shrink: 0;
    }

    .teks-opsi {
      align-items: center;
      flex: 1;
    }

    .opsi-badge {
      display: inline-block;
      font-weight: bold;
      margin-right: 8px;
      color: #0d6efd;
    }

    .d-none {
      display: none !important;
    }

    #timer-display {
      font-weight: bold;
      font-size: 1.2rem;
      color: #d32f2f;
      background: white;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .arabic-line {
      direction: rtl;
      text-align: right;
      font-family: 'Amiri', 'Traditional Arabic', 'Noto Sans Arabic', 'Tahoma', sans-serif;
      font-size: 1.8rem;
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }

    .latin-line {
      direction: ltr;
      text-align: left;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin-bottom: 0.5rem;
    }

    .rtl-opt {
      direction: rtl;
      text-align: right;
    }

    .rtl-opt .opsi-badge {
      float: left;
      margin-left: 8px;
      margin-right: 0;
    }

    .highlight {
      background-color: #ffeb3b;
      color: #000;
      padding: 0 4px;
      border-radius: 4px;
      font-weight: 500;
    }

    .btn-reload {
      background-color: #17a2b8;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 10px;
      width: 100%;
    }

    .btn-reload:hover {
      background-color: #138496;
    }

    .latin-line,
    .arabic-line,
    .teks-opsi {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-cbt shadow sticky-top mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand h4 m-0 fw-bold text-white"><i class="bi bi-mortarboard-fill me-2"></i>CBT MTsN 1
        CIAMIS</span>
      <div id="wrapper-timer" class="d-none"><span id="timer-display">00:00:00</span></div>
    </div>
  </nav>

  <div class="container">
    <div id="view-login" class="login-container mx-auto">
      <div class="card card-login p-4">
        <h4 class="text-center fw-bold mb-4 text-primary">LOGIN PESERTA</h4>
        <div class="mb-3"><label class="form-label small fw-bold text-muted">USERNAME ATAU NAMA</label><input
            type="text" id="in-user" class="form-control form-control-lg fs-6"
            placeholder="Masukkan Username atau Nama Lengkap"></div>
        <div class="mb-3"><label class="form-label small fw-bold text-muted">KELAS</label><select id="in-kelas"
            class="form-select form-control-lg fs-6">
            <option value="" disabled selected>-- Pilih Kelas --</option>
            <option value="9A">Kelas 9A</option>
            <option value="9B">Kelas 9B</option>
            <option value="9C">Kelas 9C</option>
            <option value="9D">Kelas 9D</option>
            <option value="9E">Kelas 9E</option>
            <option value="9F">Kelas 9F</option>
          </select></div>
        <div class="mb-4"><label class="form-label small fw-bold text-danger">TOKEN</label><input type="text"
            id="in-token" class="form-control form-control-lg text-center fw-bold" placeholder="MASUKKAN TOKEN"></div>
        <button class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="mulaiProses()">MULAI UJIAN</button>
        <div class='w-100 text-center mt-3'><a href="#">Masuk Admin Panel</a></div>
      </div>
    </div>

    <div id="view-exam" class="row d-none">
      <div class="col-lg-8 mb-4">
        <div class="q-card p-4">
          <div class="d-flex justify-content-between border-bottom pb-3 mb-4"><span id="txt-mapel"
              class="badge bg-secondary p-2">MAPEL</span><span id="txt-no" class="fw-bold text-primary">SOAL NOMOR
              1</span></div>
          <div id="area-soal" class="mb-5" style="min-height: 250px;"></div>
          <div class="row g-2 text-center border-top pt-4">
            <div class="col-4"><button class="btn btn-outline-dark w-100 py-2" onclick="move(-1)">KEMBALI</button></div>
            <div class="col-4"><button id="btn-ragu" class="btn btn-warning w-100 py-2 fw-bold"
                onclick="setRagu()">RAGU-RAGU</button></div>
            <div class="col-4"><button class="btn btn-primary w-100 py-2 fw-bold" onclick="move(1)">LANJUT</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="q-card p-3">
          <h6 class="fw-bold mb-3"><i class="bi bi-grid-3x3-gap-fill me-2"></i>NOMOR SOAL</h6>
          <div id="area-nav" class="d-flex flex-wrap justify-content-center mb-4"></div>
          <hr>
          <div id="info-lock" class="text-center mb-2 small text-danger fw-bold"></div>
          <button id="btn-selesai" class="btn btn-danger w-100 fw-bold py-2 shadow-sm" disabled
            onclick="konfirmasiSelesai()">SELESAI UJIAN</button>
          <button id="btn-reload" class="btn-reload" onclick="reloadJawabanTersimpan()" style="display:none;"><i
              class="bi bi-arrow-repeat"></i> Muat Ulang Jawaban</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // ==================== KONFIGURASI REDIS ====================
    const REDIS_ENDPOINT = "https://dear-monarch-83839.upstash.io";
    const REDIS_TOKEN = "gQAAAAAAAUd_AAIgcDE2Y2JmMTZhZWU5OGE0MmRkOTI3ZDc5ZTU1ZDYzNDIzZg";

    // Fungsi umum untuk mengirim perintah Redis via POST body array (sesuai dokumentasi Upstash)
    async function redisCommand(...args) {
      const response = await fetch(REDIS_ENDPOINT, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${REDIS_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(args)
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      return data.result;
    }

    // Helper untuk HSET batch (menerima object field->value)
    async function hsetBatch(key, fieldValueMap) {
      const args = ['HSET', key];
      for (const [field, value] of Object.entries(fieldValueMap)) {
        args.push(field, value);
      }
      return redisCommand(...args);
    }

    // Helper untuk HGETALL return object
    async function hgetall(key) {
      const arr = await redisCommand('HGETALL', key);
      const obj = {};
      for (let i = 0; i < arr.length; i += 2) obj[arr[i]] = arr[i + 1];
      return obj;
    }

    // Helper EXISTS
    async function exists(key) {
      return await redisCommand('EXISTS', key) === 1;
    }

    // Helper SETEX
    async function setex(key, seconds, value) {
      return await redisCommand('SETEX', key, seconds, value);
    }

    // Helper DEL multiple keys
    async function del(...keys) {
      return await redisCommand('DEL', ...keys);
    }

    // ==================== VARIABEL GLOBAL ====================
    let quest = [], kunci = {}, jawUser = {}, ragu = {};
    let idx = 0, sisa = 0, statusUjian = "OFF";
    let pelanggaran = 0;
    let currentToken = '', currentUsername = '', currentNama = '', currentKelas = '', currentMapel = '', currentLoginVia = '';
    let timerInterval = null;
    let isSubmitting = false;
    let currentRedisKey = '';

    // --------------------- LOCALSTORAGE BACKUP ---------------------
    function simpanKeLocalStorage() {
      if (!currentToken || !currentUsername) return;
      try {
        localStorage.setItem(`cbt_local_${currentToken}_${currentUsername}`, JSON.stringify(jawUser));
      } catch (e) { console.error('Gagal simpan ke localStorage:', e); }
    }

    function muatDariLocalStorage() {
      const key = `cbt_local_${currentToken}_${currentUsername}`;
      const data = localStorage.getItem(key);
      if (data) {
        const parsed = JSON.parse(data);
        Object.assign(jawUser, parsed);
        console.log(`Memuat ${Object.keys(parsed).length} jawaban dari localStorage`);
        return true;
      }
      return false;
    }

    function hapusLocalStorage() {
      localStorage.removeItem(`cbt_local_${currentToken}_${currentUsername}`);
    }

    function setRedisKey(token, username) {
      currentRedisKey = `cbt:${token}:${username}`;
    }

    async function saveAllJawaban() {
      if (!currentRedisKey || Object.keys(jawUser).length === 0) return;
      try {
        await hsetBatch(currentRedisKey, jawUser);
        console.log('Jawaban disimpan ke Redis (HSET batch)');
        // Opsional: hapus localStorage setelah sukses simpan ke Redis (tapi jangan dulu agar cadangan tetap ada)
        // hapusLocalStorage();
      } catch (e) { console.error('Gagal simpan jawaban batch:', e); }
    }

    let autoSaveInterval = null;
    function startAutoSave() {
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      autoSaveInterval = setInterval(() => {
        if (statusUjian === "AKTIF") saveAllJawaban();
      }, 600000); // 10 menit
    }

    window.addEventListener('beforeunload', () => {
      if (statusUjian === "AKTIF") saveAllJawaban();
    });

    async function muatJawabanDariRedis() {
      const jawaban = await hgetall(currentRedisKey);
      if (Object.keys(jawaban).length > 0) {
        Object.assign(jawUser, jawaban);
        hapusLocalStorage(); // data di Redis lebih baru, hapus cadangan lokal
        console.log('Data dari Redis dimuat');
      } else {
        const loaded = muatDariLocalStorage();
        if (!loaded) console.log('Tidak ada data cadangan');
      }
    }

    async function cekSudahUjianRedis(username, mapel) {
      const key = `done:${mapel}:${username}`;
      return await exists(key);
    }
    async function tandaiSudahUjianRedis(username, mapel) {
      const key = `done:${mapel}:${username}`;
      await setex(key, 86400, '1');
    }
    async function hapusDataRedis(token, username) {
      const keyJawaban = `cbt:${token}:${username}`;
      await del(keyJawaban);
    }

    function hitungSkorLokal(jawabanTeks, kunci) {
      let benar = 0;
      const total = Object.keys(kunci).length;
      for (let id in kunci) {
        const userJawab = jawabanTeks[id] || "";
        const kunciJawab = kunci[id];
        if (Array.isArray(kunciJawab)) {
          const userArr = Array.isArray(userJawab) ? userJawab : [userJawab];
          if (userArr.sort().join() === kunciJawab.sort().join()) benar++;
        } else {
          if (userJawab === kunciJawab) benar++;
        }
      }
      return total > 0 ? Math.round((benar / total) * 100) : 0;
    }

    // ==================== DETEKSI PINDAH TAB ====================
    function catatPelanggaran() {
      if (statusUjian !== "AKTIF") return;
      pelanggaran++;
      if (pelanggaran === 1) Swal.fire('Peringatan 1', 'Jangan pindah tab atau membuka aplikasi lain!', 'warning');
      else if (pelanggaran === 2) Swal.fire('Peringatan 2', 'Sekali lagi melanggar, ujian akan otomatis dikirim!', 'error');
      else if (pelanggaran >= 3) {
        Swal.fire('Diskualifikasi', 'Anda melanggar 3 kali. Jawaban dikirim otomatis.', 'error').then(() => kirimJawaban());
      }
    }
    
    document.addEventListener('visibilitychange', () => {
      if (statusUjian === "AKTIF" && document.hidden) {
        catatPelanggaran();
      }
    });

    window.addEventListener('beforeunload', (e) => {
      if (statusUjian === "AKTIF" && !isSubmitting) {
        e.preventDefault();
        e.returnValue = 'Ujian sedang berlangsung. Yakin ingin meninggalkan halaman?';
        return e.returnValue;
      }
    });

    async function reloadJawabanTersimpan() {
      if (!currentToken || !currentUsername) return Swal.fire('Info', 'Data session tidak lengkap', 'info');
      Swal.fire({ title: 'Memuat ulang jawaban...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      await muatJawabanDariRedis();
      showQuest();
      showNav();
      Swal.fire('Sukses', `Berhasil memuat ${Object.keys(jawUser).length} jawaban tersimpan`, 'success', 1500);
    }

    // ==================== LOGIN ====================
    function mulaiProses() {
      const userInput = document.getElementById('in-user').value;
      const k = document.getElementById('in-kelas').value;
      const t = document.getElementById('in-token').value;
      if (!userInput || !k || !t) return Swal.fire('Error', 'Lengkapi semua field!', 'error');
      currentToken = t;
      currentKelas = k;
      setRedisKey(currentToken, '');
      Swal.fire({ title: 'Menyiapkan Soal...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run
        .withSuccessHandler(async (res) => {
          if (res.status === "success") {
            quest = res.soal;
            kunci = res.kunci;
            currentMapel = res.mapel;
            currentUsername = res.username;
            currentNama = res.namaSiswa;
            currentLoginVia = res.loginVia;
            sisa = res.sisaWaktuServer;
            jawUser = {};
            setRedisKey(currentToken, currentUsername);

            const sudah = await cekSudahUjianRedis(currentUsername, currentMapel);
            if (sudah) {
              Swal.fire('Info', 'Anda sudah mengikuti ujian ini!', 'info').then(() => resetAll());
              return;
            }
            if (sisa <= 0) {
              Swal.fire('Waktu Habis', 'Sesi ujian telah berakhir.', 'error').then(() => resetAll());
              return;
            }

            await muatJawabanDariRedis();

            Swal.fire({
              title: 'Login Berhasil!',
              html: `Selamat mengerjakan, <strong>${res.namaSiswa}</strong>!<br><span style="color:green">Jawaban dipulihkan: ${Object.keys(jawUser).length} soal</span>`,
              icon: 'success',
              confirmButtonText: `${Object.keys(jawUser).length > 0 ? 'Lanjutkan' : 'Mulai'} Ujian Sekarang`,
              allowOutsideClick: false
            }).then((result) => {
              if (result.isConfirmed) {
                enterFullscreen();
                statusUjian = "AKTIF";
                document.getElementById('view-login').classList.add('d-none');
                document.getElementById('view-exam').classList.remove('d-none');
                document.getElementById('wrapper-timer').classList.remove('d-none');
                document.getElementById('txt-mapel').innerText = res.mapel;
                document.getElementById('btn-reload').style.display = 'block';
                idx = 0;
                showQuest();
                showNav();
                startTimer();
                startAutoSave();
              }
            });
          } else {
            Swal.fire('Gagal', res.pesan, 'error');
          }
        })
        .withFailureHandler(err => Swal.fire('Error', 'Koneksi bermasalah: ' + err.message, 'error'))
        .cekLogin(t, userInput, k);
    }

    // ==================== TAMPIL SOAL ====================
    function showQuest() {
      const s = quest[idx];
      if (!s) return;
      document.getElementById('txt-no').innerHTML = `SOAL NOMOR ${idx + 1}`;
      const lines = s.pertanyaan.split(/\r?\n/);
      let pertanyaanHtml = '';
      lines.forEach(line => {
        line = line.trim();
        if (line === '') return;
        const hasArabic = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(line);
        const dir = hasArabic ? 'rtl' : 'ltr';
        const className = hasArabic ? 'arabic-line' : 'latin-line';
        pertanyaanHtml += `<div class="${className}" dir="${dir}">${formatMarkdownInline(line)}</div>`;
      });
      let html = `<div class="fs-5 mb-4 fw-medium">${pertanyaanHtml}</div>`;
      if (s.gambarPertanyaan) html += `<div class="text-center mb-3"><img src="${s.gambarPertanyaan}" class="gambar-pertanyaan" onerror="this.style.display='none'" alt="Gambar soal"></div>`;
      if (s.opsi && s.opsi.length > 0) {
        s.opsi.forEach((opsi, optIndex) => {
          const optKey = `${s.id}_${optIndex}`;
          const jawabanTersimpan = jawUser[s.id];
          const isSelected = String(jawabanTersimpan) === String(optKey);
          const optionLetter = String.fromCharCode(65 + optIndex);
          const hasArabicOpt = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(opsi.text);
          const optDir = hasArabicOpt ? 'rtl' : 'ltr';
          const optClass = hasArabicOpt ? 'rtl-opt' : '';
          html += `<div class="opt-box ${isSelected ? 'opt-selected' : ''} ${optClass}" onclick="pilih('${s.id}', '${optKey}')" dir="${optDir}">
            <div class="opsi-badge">${optionLetter}.</div>`;
          if (opsi.imageUrl) html += `<img src="${opsi.imageUrl}" class="gambar-opsi" onerror="this.style.display='none'" alt="Gambar opsi">`;
          html += `<div class="teks-opsi">${formatMarkdownInline(opsi.text || `Pilihan ${optionLetter}`)}</div>`;
          if (isSelected) html += `<i class="bi bi-check-circle-fill text-primary fs-5"></i>`;
          html += `</div>`;
        });
      } else {
        html += '<p class="text-muted">Tidak ada opsi jawaban</p>';
      }
      document.getElementById('area-soal').innerHTML = html;
    }

    function formatMarkdownInline(text) {
      if (!text) return '';
      let html = escapeHtml(text);
      html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/__(.*?)__/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/_(.*?)_/g, '<em>$1</em>');
      html = html.replace(/==(.*?)==/g, '<mark class="highlight">$1</mark>');
      html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
      html = html.replace(/\+\+(.*?)\+\+/g, '<u>$1</u>');
      html = html.replace(/`(.*?)`/g, '<code>$1</code>');
      return html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== PILIH JAWABAN ====================
    function pilih(soalId, optKey) {
      jawUser[soalId] = optKey;
      delete ragu[soalId];
      showQuest();
      showNav();
      simpanKeLocalStorage(); // langsung backup ke localStorage
    }

    function setRagu() {
      const currentSoal = quest[idx];
      if (!currentSoal) return;
      const id = currentSoal.id;
      if (!jawUser[id]) return Swal.fire('Info', 'Pilih jawaban dulu sebelum memberi tanda ragu-ragu', 'info');
      ragu[id] = !ragu[id];
      showNav();
      Swal.fire('Info', `Soal ${idx + 1} ${ragu[id] ? 'ditandai ragu-ragu' : 'tidak ragu lagi'}`, 'info', 1000);
    }

    function showNav() {
      let h = '';
      quest.forEach((s, i) => {
        let cls = 'btn-outline-secondary';
        if (ragu[s.id]) cls = 'status-ragu';
        else if (jawUser[s.id]) cls = 'status-yakin';
        let act = i === idx ? 'active-now' : '';
        h += `<button class="btn btn-nomor ${cls} ${act}" onclick="navigasiKe(${i})">${i + 1}</button>`;
      });
      document.getElementById('area-nav').innerHTML = h;
      const terjawab = Object.keys(jawUser).length;
      document.getElementById('info-lock').innerHTML = `<i class="bi bi-check-circle"></i> Terjawab: ${terjawab}/${quest.length}`;
    }

    function move(n) { if (idx + n >= 0 && idx + n < quest.length) { idx += n; showQuest(); showNav(); } }
    function navigasiKe(tujuan) { idx = tujuan; showQuest(); showNav(); }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (sisa <= 0) { kirimJawaban(); return; }
      const display = document.getElementById('timer-display');
      const infoLock = document.getElementById('info-lock');
      const btnSelesai = document.getElementById('btn-selesai');
      timerInterval = setInterval(() => {
        if (statusUjian !== "AKTIF") { clearInterval(timerInterval); return; }
        if (sisa <= 0) { clearInterval(timerInterval); kirimJawaban(); return; }
        sisa--;
        let h = Math.floor(sisa / 3600), m = Math.floor((sisa % 3600) / 60), s = sisa % 60;
        display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        const isWaktuKritis = sisa <= 600;
        if (isWaktuKritis) {
          btnSelesai.disabled = false;
          infoLock.innerHTML = `<i class="bi bi-unlock-fill"></i> Tombol Selesai Aktif (waktu kritis)`;
          infoLock.classList.remove('text-danger'); infoLock.classList.add('text-success');
        } else {
          btnSelesai.disabled = true;
          let menitTunggu = Math.floor((sisa - 600) / 60);
          let detikTunggu = (sisa - 600) % 60;
          infoLock.innerHTML = `<i class="bi bi-lock-fill"></i> Selesai akan aktif dalam: ${menitTunggu}:${detikTunggu.toString().padStart(2, '0')} menit (waktu kritis ≤ 10 menit)`;
          infoLock.classList.add('text-danger'); infoLock.classList.remove('text-success');
        }
      }, 1000);
    }

    async function konfirmasiSelesai() {
      if (isSubmitting) return;
      const raguCount = Object.keys(ragu).filter(id => ragu[id]).length;
      if (raguCount > 0) return Swal.fire('Peringatan', `Masih ada ${raguCount} soal ditandai ragu!`, 'warning');
      const belumTerjawab = quest.filter(s => !jawUser[s.id]).length;
      if (belumTerjawab > 0) return Swal.fire('Peringatan', `Masih ada ${belumTerjawab} soal belum dijawab!`, 'warning');
      Swal.fire({
        title: 'Akhiri Ujian?',
        text: "Jawaban tidak bisa diubah setelah dikirim.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Ya, Kirim!',
        cancelButtonText: 'Batal'
      }).then(res => { if (res.isConfirmed) kirimJawaban(); });
    }

    async function kirimJawaban() {
      if (isSubmitting || statusUjian !== "AKTIF") return;

      await saveAllJawaban();

      const jawabanTeks = {};
      for (let soalId in jawUser) {
        const optKey = jawUser[soalId];
        const soal = quest.find(q => q.id === soalId);
        if (soal && optKey) {
          const optIndex = parseInt(optKey.split('_')[1]);
          if (soal.opsi && soal.opsi[optIndex]) jawabanTeks[soalId] = soal.opsi[optIndex].text;
        } else jawabanTeks[soalId] = "";
      }
      const skorLokal = hitungSkorLokal(jawabanTeks, kunci);

      const payload = {
        token: currentToken,
        nama: currentNama,
        kelas: currentKelas,
        mapel: currentMapel,
        jawaban: jawabanTeks,
        kunci: kunci,
        pelanggaran: pelanggaran,
        username: currentUsername,
        loginVia: currentLoginVia
      };

      google.script.run
        .withSuccessHandler(async (skorServer) => {
          await tandaiSudahUjianRedis(currentUsername, currentMapel);
          await hapusDataRedis(currentToken, currentUsername);
          hapusLocalStorage();
          resetAll();
        })
        .withFailureHandler(err => {
          console.error('Gagal simpan ke server:', err);
          Swal.fire('Peringatan', 'Gagal menyimpan jawaban ke server. Hubungi pengawas!', 'error').then(() => resetAll());
        })
        .simpanKeDatabaseFinal(payload);

      isSubmitting = true;
      statusUjian = "SELESAI";
      if (timerInterval) clearInterval(timerInterval);
      if (autoSaveInterval) clearInterval(autoSaveInterval);

      await Swal.fire({
        title: 'Ujian Selesai!',
        html: `Selamat Ujian Selesai. Skor Anda: <strong style="font-size:2rem">${skorLokal}</strong>`,
        icon: 'success',
        confirmButtonText: 'OK'
      });
    }

    function resetAll() {
      quest = []; kunci = {}; jawUser = {}; ragu = {};
      idx = 0; sisa = 0; statusUjian = "OFF"; pelanggaran = 0;
      currentToken = ''; currentUsername = ''; currentNama = ''; currentKelas = ''; currentMapel = ''; currentLoginVia = '';
      isSubmitting = false;
      if (timerInterval) clearInterval(timerInterval);
      if (autoSaveInterval) clearInterval(autoSaveInterval);
      hapusLocalStorage();
      document.getElementById('view-exam').classList.add('d-none');
      document.getElementById('wrapper-timer').classList.add('d-none');
      document.getElementById('btn-reload').style.display = 'none';
      const loginDiv = document.getElementById('view-login');
      loginDiv.classList.remove('d-none');
      document.getElementById('in-user').value = '';
      document.getElementById('in-kelas').selectedIndex = 0;
      document.getElementById('in-token').value = '';
    }

    // ==================== FULLSCREEN ====================
    let fullscreenBypass = false;
    let fullscreenWatchInterval = null;

    function enterFullscreen() {
      const docEl = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        try {
          if (docEl.requestFullscreen) docEl.requestFullscreen();
          else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
          else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
        } catch (err) { console.warn(err); }
      }
    }

    function exitFullscreen() {
      const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
      if (exit) exit.call(document);
    }

    function startFullscreenWatch() {
      if (fullscreenWatchInterval) clearInterval(fullscreenWatchInterval);
      fullscreenWatchInterval = setInterval(() => {
        if (fullscreenBypass) return;
      }, 500);
    }

    function handleFullscreenExit() {
      if (fullscreenBypass) return;
      Swal.fire({
        icon: 'warning',
        title: 'Mode layar penuh diperlukan',
        text: 'Klik di mana saja untuk kembali ke mode layar penuh.',
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000
      });
      const once = () => {
        enterFullscreen();
        document.body.removeEventListener('click', once);
      };
      document.body.addEventListener('click', once, { once: true });
    }

    document.addEventListener('fullscreenchange', () => {
      const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (!isFullscreen && !fullscreenBypass) handleFullscreenExit();
    });
    document.addEventListener('webkitfullscreenchange', () => {
      const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (!isFullscreen && !fullscreenBypass) handleFullscreenExit();
    });

    window.addEventListener('load', () => {
      Swal.fire({
        title: 'Mode Layar Penuh',
        text: 'Klik tombol di bawah untuk memulai ujian dalam mode layar penuh.',
        icon: 'info',
        confirmButtonText: 'Masuk Layar Penuh',
        allowOutsideClick: false
      }).then(() => {
        enterFullscreen();
        startFullscreenWatch();
        Swal.fire('Sukses', 'Mode layar penuh aktif. Silakan login.', 'success');
      });
    });

    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
      }
      if (e.ctrlKey && e.code === 'Space') {
        e.preventDefault();
        fullscreenBypass = true;
        exitFullscreen();
        if (statusUjian === "AKTIF") {
          Swal.fire('Admin Bypass', 'Anda keluar dari mode layar penuh. Ujian tetap berjalan.', 'info');
        }
        setTimeout(() => { fullscreenBypass = false; }, 10000);
      }
    });
  </script>
