<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin CBT - Reset Siswa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: none;
      margin-bottom: 1.5rem;
    }

    .card-header {
      background: white;
      border-bottom: 2px solid #e9ecef;
      font-weight: 600;
    }

    .btn-action {
      padding: 0.75rem;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary"><i class="bi bi-shield-lock-fill"></i> Admin CBT</h2>
      <p class="text-muted">Reset data siswa berdasarkan <strong>Username</strong> (Mapel otomatis terdeteksi dari
        token)</p>
    </div>

    <div class="card">
      <div class="card-header bg-white"><i class="bi bi-person-badge"></i> Data Siswa</div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username Siswa <span class="text-danger">*</span></label>
          <input type="text" id="username" class="form-control form-control-lg" placeholder="Contoh: ahmad123">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header bg-white"><i class="bi bi-tools"></i> Aksi Reset</div>
      <div class="card-body">
        <div class="d-grid gap-3">
          <button class="btn btn-warning btn-action text-white" onclick="resetDoneOnly()">
            <i class="bi bi-arrow-repeat me-2"></i> Reset Status Pengerjaan Siswa
          </button>
          <button class="btn btn-danger btn-action" onclick="resetTotal()">
            <i class="bi bi-trash3-fill me-2"></i> Reset TOTAL (Redis + Sheet)
          </button>
          <button class="btn btn-warning btn-action text-white" onclick="resetActiveOnly()">
            <i class="bi bi-arrow-repeat me-2"></i> Reset Session Aktif Saja
          </button>
          <button class="btn btn-success btn-action" onclick="forceSubmitSiswa()">
            <i class="bi bi-send-check me-2"></i> Submit Jawaban Sementara ke Sheet
          </button>
          <button class="btn btn-secondary btn-action" onclick="hapusFinalOnly()">
            <i class="bi bi-file-earmark-x me-2"></i> Hapus Data Final (Nilai) Saja
          </button>
        </div>
      </div>
    </div>

    <div class="alert alert-info mt-3">
      <i class="bi bi-info-circle-fill me-2"></i>
      <strong>Catatan:</strong> Mapel akan dideteksi otomatis dari token yang ditemukan di Redis. Jika siswa belum
      memiliki session, reset total tetap bisa dilakukan (tanpa mapel).
    </div>
  </div>

  <script>
    function getUsername() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        Swal.fire('Peringatan', 'Username tidak boleh kosong', 'warning');
        return null;
      }
      return username;
    }

    async function resetTotal() {
      const username = getUsername();
      if (!username) return;
      const confirm = await Swal.fire({
        title: 'Reset Total Siswa?',
        html: `Hapus SEMUA data <strong>${username}</strong>? Termasuk session, jawaban sementara, status selesai, nilai final, dan baris di sheet.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Ya, Reset Total!'
      });
      if (!confirm.isConfirmed) return;
      Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const result = await google.script.run.adminResetTotal(username);
        Swal.fire('Berhasil', result.message, 'success');
        document.getElementById('username').value = '';
      } catch (err) {
        Swal.fire('Gagal', err.message, 'error');
      }
    }

    async function resetActiveOnly() {
      const username = getUsername();
      if (!username) return;
      const confirm = await Swal.fire({
        title: 'Reset Session Aktif?', text: `Hapus session aktif untuk ${username}.`, icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Reset'
      });
      if (!confirm.isConfirmed) return;
      Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const result = await google.script.run.adminResetActiveOnly(username);
        Swal.fire('Berhasil', result.message, 'success');
      } catch (err) {
        Swal.fire('Gagal', err.message, 'error');
      }
    }
    
    async function resetDoneOnly() {
      const username = getUsername();
      if (!username) return;
      const confirm = await Swal.fire({
        title: 'Reset Session Aktif?', text: `Hapus Status Pegerjaan aktif untuk ${username}.`, icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Reset'
      });
      if (!confirm.isConfirmed) return;
      Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const result = await google.script.run.adminResetDone(username);
        Swal.fire('Berhasil', result.message, 'success');
      } catch (err) {
        Swal.fire('Gagal', err.message, 'error');
      }
    }

    async function forceSubmitSiswa() {
      const username = getUsername();
      if (!username) return;
      const confirm = await Swal.fire({
        title: 'Submit Jawaban Sementara?', text: `Kirim semua jawaban ${username} ke sheet.`, icon: 'info', showCancelButton: true, confirmButtonText: 'Ya, Submit'
      });
      if (!confirm.isConfirmed) return;
      Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const result = await google.script.run.adminForceSubmitByUsername(username);
        Swal.fire('Selesai', `Berhasil submit. Skor: ${result.skor || '-'}`, 'success');
      } catch (err) {
        Swal.fire('Gagal', err.message, 'error');
      }
    }

    async function hapusFinalOnly() {
      const username = getUsername();
      if (!username) return;
      const confirm = await Swal.fire({
        title: 'Hapus Data Final?', text: `Hapus nilai final ${username} dari Redis dan sheet.`, icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Hapus'
      });
      if (!confirm.isConfirmed) return;
      Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const result = await google.script.run.adminHapusFinalOnly(username);
        Swal.fire('Berhasil', result.message, 'success');
      } catch (err) {
        Swal.fire('Gagal', err.message, 'error');
      }
    }

    async function resetDisqualification() {
      const username = getUsername();
      if (!username) return;
      const confirm = await Swal.fire({
        title: 'Reset Data Siswa?', text: `Hapus data ${username} dari Redis (session, jawaban, status) tanpa menghapus baris di sheet.`, icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Reset'
      });
      if (!confirm.isConfirmed) return;
      Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const result = await google.script.run.adminResetDataSiswa(username);
        Swal.fire('Berhasil', result.message, 'success');
      } catch (err) {
        Swal.fire('Gagal', err.message, 'error');
      }
    }
  </script>
</body>

</html>
