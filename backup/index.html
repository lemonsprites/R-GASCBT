<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root { --primary-color: #0d47a1; --accent-color: #ffca28; }
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Navbar Style */
    .navbar-cbt { background: var(--primary-color); border-bottom: 5px solid var(--accent-color); color: white; }
    
    /* Login Card */
    .login-container { max-width: 450px; margin-top: 80px; }
    .card-login { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    /* Exam Style */
    .q-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; }
    .btn-nomor { width: 45px; height: 45px; margin: 4px; font-weight: bold; border-radius: 8px; }
    .status-yakin { background-color: #0d6efd !important; color: white; border: none; }
    .status-ragu { background-color: #ffc107 !important; color: black; border: none; }
    .active-now { border: 3px solid #333 !important; }
    
    /* Option Boxes */
    .opt-box { cursor: pointer; border: 1px solid #dee2e6; padding: 15px; margin-bottom: 10px; border-radius: 10px; transition: 0.3s; }
    .opt-box:hover { background-color: #f1f3f5; }
    .opt-selected { background-color: #e3f2fd; border-color: #0d6efd; font-weight: 500; }
    
    /* Utility */
    .d-none { display: none !important; }
    #timer-display { font-weight: bold; font-size: 1.2rem; color: #d32f2f; background: white; padding: 5px 15px; border-radius: 30px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-cbt shadow sticky-top mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand h4 m-0 fw-bold text-white"><i class="bi bi-mortarboard-fill me-2"></i>CBT MTsN 1 CIAMIS</span>
      <div id="wrapper-timer" class="d-none">
        <span id="timer-display">00:00:00</span>
      </div>
    </div>
  </nav>

  <div class="container">
    
    <div id="view-login" class="login-container mx-auto">
      <div class="card card-login p-4">
        <h4 class="text-center fw-bold mb-4 text-primary">LOGIN PESERTA</h4>
        
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">NAMA LENGKAP</label>
          <input type="text" id="in-nama" class="form-control form-control-lg fs-6" placeholder="Nama Peserta">
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">KELAS</label>
          <select id="in-kelas" class="form-select form-control-lg fs-6">
            <option value="" disabled selected>-- Pilih Kelas --</option>
            <option value="9A">Kelas 9A</option>
            <option value="9B">Kelas 9B</option>
            <option value="9C">Kelas 9C</option>
            <option value="9D">Kelas 9D</option>
            <option value="9E">Kelas 9E</option>
            <option value="9F">Kelas 9F</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-danger">TOKEN</label>
          <input type="text" id="in-token" class="form-control form-control-lg text-center fw-bold text-uppercase" placeholder="MASUKKAN TOKEN">
        </div>

        <button class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="mulaiProses()">MULAI UJIAN</button>
        
        <div class="text-center mt-3">
          <button class="btn btn-link btn-sm text-decoration-none text-muted" onclick="loginAdmin()">Panel Admin</button>
        </div>
      </div>
    </div>

    <div id="view-exam" class="row d-none">
      <div class="col-lg-8 mb-4">
        <div class="q-card p-4">
          <div class="d-flex justify-content-between border-bottom pb-3 mb-4">
            <span id="txt-mapel" class="badge bg-secondary p-2">MAPEL</span>
            <span id="txt-no" class="fw-bold text-primary">SOAL NOMOR 1</span>
          </div>
          
          <div id="area-soal" class="mb-5" style="min-height: 250px;">
            </div>

          <div class="row g-2 text-center border-top pt-4">
            <div class="col-4"><button class="btn btn-outline-dark w-100 py-2" onclick="move(-1)">KEMBALI</button></div>
            <div class="col-4"><button id="btn-ragu" class="btn btn-warning w-100 py-2 fw-bold" onclick="setRagu()">RAGU-RAGU</button></div>
            <div class="col-4"><button class="btn btn-primary w-100 py-2 fw-bold" onclick="move(1)">LANJUT</button></div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="q-card p-3">
          <h6 class="fw-bold mb-3"><i class="bi bi-grid-3x3-gap-fill me-2"></i>NOMOR SOAL</h6>
          <div id="area-nav" class="d-flex flex-wrap justify-content-center mb-4">
            </div>
          <hr>
          <div id="info-lock" class="text-center mb-2 small text-danger fw-bold"></div>
          <button id="btn-selesai" class="btn btn-danger w-100 fw-bold py-2 shadow-sm" disabled onclick="konfirmasiSelesai()">SELESAI UJIAN</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let quest = [], kunci = {}, jawUser = {}, ragu = {}, info = {};
    let idx = 0, sisa = 0, statusUjian = "OFF";
    let pelanggaran = 0;

    // FITUR ANTI CURANG
    window.onblur = () => {
      if(statusUjian === "AKTIF") {
        pelanggaran++;
        if(pelanggaran === 1) Swal.fire('Peringatan 1', 'Jangan pindah tab atau membuka aplikasi lain!', 'warning');
        else if(pelanggaran === 2) Swal.fire('Peringatan 2', 'Sekali lagi melanggar, ujian akan otomatis dikirim!', 'error');
        else if(pelanggaran >= 3) {
          statusUjian = "SELESAI";
          Swal.fire('Diskualifikasi', 'Anda melanggar 3 kali. Jawaban dikirim otomatis.', 'error').then(() => kirimJawaban());
        }
      }
    };

    function mulaiProses() {
      const n = document.getElementById('in-nama').value;
      const k = document.getElementById('in-kelas').value;
      const t = document.getElementById('in-token').value;
      
      if(!n || !k || !t) return Swal.fire('Error', 'Lengkapi Nama, Kelas, dan Token!', 'error');

      Swal.fire({ title: 'Menyiapkan Soal...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      google.script.run.withSuccessHandler(res => {
        if(res.status === "success") {
          quest = res.soal; kunci = res.kunci;
          info = { nama: n, kelas: k, mapel: res.mapel };
          sisa = res.durasi * 60;
          statusUjian = "AKTIF";
          
          // PINDAH TAMPILAN
          document.getElementById('view-login').classList.add('d-none');
          document.getElementById('view-exam').classList.remove('d-none');
          document.getElementById('wrapper-timer').classList.remove('d-none');
          document.getElementById('txt-mapel').innerText = res.mapel;
          
          showQuest(); showNav(); startTimer();
          Swal.close();
        } else {
          Swal.fire('Gagal', res.pesan, 'error');
        }
      }).cekAksesUjian(t);
    }

    function showQuest() {
      const s = quest[idx];
      document.getElementById('txt-no').innerText = `SOAL NOMOR ${idx + 1}`;
      let html = `<p class="fs-5 mb-4 fw-medium">${s.pertanyaan}</p>`;
      
      s.opsi.forEach(o => {
        const isSel = jawUser[s.id] === o ? 'opt-selected' : '';
        html += `<div class="opt-box ${isSel}" onclick="pilih('${s.id}', '${o}')">
          <i class="bi ${isSel ? 'bi-check-circle-fill text-primary' : 'bi-circle'} me-2"></i> ${o}
        </div>`;
      });
      document.getElementById('area-soal').innerHTML = html;
    }

    function pilih(id, o) {
      jawUser[id] = o;
      delete ragu[id]; // Otomatis yakin jika memilih ulang
      showQuest(); showNav();
    }

    function setRagu() {
      const id = quest[idx].id;
      if(!jawUser[id]) return Swal.fire('Info', 'Pilih jawaban dulu sebelum ragu-ragu', 'info');
      ragu[id] = !ragu[id];
      showNav();
    }

    function showNav() {
      let h = '';
      quest.forEach((s, i) => {
        let cls = 'btn-outline-secondary';
        if(ragu[s.id]) cls = 'status-ragu';
        else if(jawUser[s.id]) cls = 'status-yakin';
        
        let act = i === idx ? 'active-now' : '';
        h += `<button class="btn btn-nomor ${cls} ${act}" onclick="idx=${i};showQuest();showNav()">${i+1}</button>`;
      });
      document.getElementById('area-nav').innerHTML = h;
    }

    function move(n) {
      if(idx + n >= 0 && idx + n < quest.length) {
        idx += n; showQuest(); showNav();
      }
    }

    function startTimer() {
      const display = document.getElementById('timer-display');
      const infoLock = document.getElementById('info-lock');
      const btnSelesai = document.getElementById('btn-selesai');

      const timer = setInterval(() => {
        if(statusUjian !== "AKTIF") { clearInterval(timer); return; }
        
        let h = Math.floor(sisa / 3600), m = Math.floor((sisa % 3600) / 60), s = sisa % 60;
        display.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        
        // LOCK TOMBOL (Aktif 10 menit sebelum habis = 600 detik)
        if(sisa > 600) {
          let sisaKunci = sisa - 600;
          let mk = Math.floor(sisaKunci / 60), sk = sisaKunci % 60;
          infoLock.innerText = `Selesai aktif dalam: ${mk}:${sk.toString().padStart(2,'0')}`;
          btnSelesai.disabled = true;
        } else {
          infoLock.innerText = "Tombol Selesai Terbuka";
          infoLock.classList.replace('text-danger', 'text-success');
          btnSelesai.disabled = false;
        }

        if(--sisa < 0) { clearInterval(timer); kirimJawaban(); }
      }, 1000);
    }

    function konfirmasiSelesai() {
      if(Object.keys(ragu).length > 0) return Swal.fire('Peringatan', 'Masih ada jawaban Ragu-Ragu (Kuning)!', 'warning');
      Swal.fire({
        title: 'Akhiri Ujian?',
        text: "Jawaban yang sudah dikirim tidak bisa diubah.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Ya, Kirim!'
      }).then(res => { if(res.isConfirmed) kirimJawaban(); });
    }

    function kirimJawaban() {
      statusUjian = "SELESAI";
      Swal.fire({ title: 'Mengirim Jawaban...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      google.script.run.withSuccessHandler(skor => {
        Swal.fire('Berhasil!', `Ujian Selesai. Skor Anda: ${skor}`, 'success').then(() => location.reload());
      }).simpanKeDatabase({...info, jawaban: jawUser, kunci: kunci, pelanggaran: pelanggaran});
    }

    function loginAdmin() {
      // Sama seperti sebelumnya...
      Swal.fire('Admin', 'Gunakan kredensial admin Anda', 'info');
    }
  </script>
</body>
</html>
