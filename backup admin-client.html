<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { padding: 20px; background: #f5f5f5; }
    .admin-container { max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>
<div class="admin-container">
  <div id="login-panel" class="card p-4" style="max-width: 400px; margin: 100px auto;">
    <h4 class="text-center">Login Admin</h4>
    <input type="password" id="admin-pass" class="form-control my-3" placeholder="Password">
    <button class="btn btn-primary w-100" onclick="doLogin()">Login</button>
  </div>
  
  <div id="dashboard-panel" style="display:none;">
    <h2>Dashboard Admin CBT</h2>
    <div id="stats" class="row mb-4"></div>
    <div id="data-table"></div>
  </div>
</div>

<script>
  function doLogin() {
    const pass = document.getElementById('admin-pass').value;
    google.script.run.withSuccessHandler(res => {
      if (res.success) {
        document.getElementById('login-panel').style.display = 'none';
        document.getElementById('dashboard-panel').style.display = 'block';
        loadStats();
        loadData();
      } else {
        Swal.fire('Error', 'Password salah!', 'error');
      }
    }).adminLogin(pass);
  }
  
  function loadStats() {
    google.script.run.withSuccessHandler(stats => {
      const html = `
        <div class="col-md-3"><div class="card p-3"><h4>${stats.totalSelesai}</h4><p>Siswa Selesai</p></div></div>
        <div class="col-md-3"><div class="card p-3"><h4>${stats.totalSiswaAktif}</h4><p>Siswa Aktif</p></div></div>
        <div class="col-md-6"><div class="card p-3"><h5>Per Mapel</h5><pre>${JSON.stringify(stats.perMapel, null, 2)}</pre></div></div>
      `;
      document.getElementById('stats').innerHTML = html;
    }).getStats();
  }
  
  function loadData() {
    google.script.run.withSuccessHandler(res => {
      let html = '<table class="table table-bordered"><thead><tr>';
      res.headers.forEach(h => html += `<th>${h}</th>`);
      html += '<th>Aksi</th></tr></thead><tbody>';
      res.data.forEach(row => {
        html += '<tr>';
        row.forEach(cell => html += `<td>${cell || ''}</td>`);
        html += `<td><button class="btn btn-sm btn-danger" onclick="reset('${row[8]}', '${row[3]}')">Reset</button></td>`;
        html += '</tr>';
      });
      html += '</tbody></table>';
      document.getElementById('data-table').innerHTML = html;
    }).getDataPermanen(50, 0);
  }
  
  function reset(username, mapel) {
    Swal.fire({ title: 'Yakin?', text: `Reset ${username} untuk ${mapel}`, icon: 'warning', showCancelButton: true })
      .then(res => {
        if (res.isConfirmed) {
          google.script.run.withSuccessHandler(() => {
            Swal.fire('Berhasil', 'Data direset', 'success');
            loadData();
            loadStats();
          }).resetSiswa(username, mapel);
        }
      });
  }
</script>
</body>
</html>
